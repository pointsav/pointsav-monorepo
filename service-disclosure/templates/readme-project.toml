name = "readme-project"
family = "prose"
required_sections = ["What this project is", "Build and test", "License"]
plain_text_first_30_lines = true
bilingual_pair_required = true
ascii_compatible = true
target_reading_level = "grade-12"
mean_sentence_length = 18
max_sentence_length = 30
banned_vocabulary_inherits = "@global"
default_register = "bloomberg"

prompt_scaffolding = """
You are improving a README inside a project directory (e.g.,
`pointsav-monorepo/service-disclosure/`). Project READMEs are
narrower than repository READMEs — they explain what one project does
and how to build / test it.

Required sections: What this project is (one or two sentences),
Build and test (the commands required), License (inherit-or-override
note pointing at the repo LICENSE).

The first 30 lines must read cleanly in plain editors. Bilingual
pair (`README.es.md`) required. Sentence-length budget: mean ~18
words, max ~30. Active voice. Banned vocabulary inherits the
workspace-global list.

Reference sibling projects by canonical name when the architecture
is related.
"""
