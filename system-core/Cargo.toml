[package]
name = "system-core"
version = "1.0.0"
edition = "2021"
rust-version = "1.73"
description = "Substrate-primitive types for the Capability Ledger Substrate: Capability, WitnessRecord, C2SP signed-note checkpoints, and RFC 9162 Merkle proof primitives."
license = "AGPL-3.0-or-later"
repository = "https://github.com/pointsav/pointsav-monorepo"
keywords = ["capability", "merkle", "ledger", "ed25519", "substrate"]
categories = ["cryptography", "data-structures"]

[workspace]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[features]
default = ["std"]
std     = ["serde/std", "sha2/std", "ed25519-dalek/std", "base64/std", "dep:serde_json"]
sel4    = ["alloc", "sha2/force-soft"]
alloc   = ["serde/alloc", "base64/alloc"]

[dependencies]
serde         = { version = "1", default-features = false, features = ["derive"] }
serde_json    = { version = "1", optional = true }
sha2          = { version = "0.10", default-features = false }
ed25519-dalek = { version = "2", default-features = false }
base64        = { version = "0.22", default-features = false }
ciborium      = { version = "0.2", default-features = false }
