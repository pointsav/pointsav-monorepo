[package]
name = "system-core"
version = "0.2.0"
edition = "2021"
rust-version = "1.73"
description = "Substrate-primitive types for the Capability Ledger Substrate: Capability, WitnessRecord, C2SP signed-note checkpoints, and RFC 9162 Merkle proof primitives."
license = "AGPL-3.0-or-later"
repository = "https://github.com/pointsav/pointsav-monorepo"
keywords = ["capability", "merkle", "ledger", "ed25519", "substrate"]
categories = ["cryptography", "data-structures"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
ed25519-dalek = { version = "2", default-features = false, features = ["std"] }
base64 = "0.22"
