[workspace]
resolver = "2"
members = [
    "service-people",
    "service-content",
    "app-console-content",
    "tool-acs-miner",
    "app-console-input",
    "system-gateway-mba",
    "service-fs",
    "system-security",
    "xtask",
    "app-console-keys",
    "app-console-system",
    "os-console",
    "app-privategit-marketplace",
    "app-privategit-source",
    "os-privategit",
    "tool-wallet",
    "app-privategit-workbench",
    "tool-proforma-engine",
    "app-orchestration-bim",
    "tool-keyplan",
    # PPN focus crates
    "system-substrate-broadcom",
    "system-network-interface",
    "os-network-admin",
    "app-network-admin",
    # PPN node-join ceremony
    "system-pairing-codes",
    "service-ppn-pairing",
]

[profile.dev]
panic = "abort"     # Required for bare-metal evaluation

[profile.release]
opt-level = "z"     # Optimize for minimum binary size
lto = true          # Link-time optimization
panic = "abort"     # Strip panic unwinding overhead
