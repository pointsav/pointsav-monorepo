[workspace]
resolver = "2"
members = [
    "service-people",
    "service-content",
    "app-console-content",
    "tool-acs-miner",
    "system-core",
    "system-ledger",
    "system-gateway-mba",
    "moonshot-toolkit",
    "service-fs",
    "system-security",
    "xtask"
]

[profile.dev]
panic = "abort"     # Required for bare-metal evaluation

[profile.release]
opt-level = "z"     # Optimize for minimum binary size
lto = true          # Link-time optimization
panic = "abort"     # Strip panic unwinding overhead
