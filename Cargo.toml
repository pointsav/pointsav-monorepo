[workspace]
resolver = "2"
members = [
    "service-people",
    "service-content",
    "service-fs",
    "service-input",
    "app-console-content",
    "tool-acs-miner",
    "system-gateway-mba",
    "system-security",
    "xtask"
]
exclude = [
    # Held-out crates that physically nest under the workspace root
    # but are deliberately not workspace members.
    # - vendor-sel4-fs: Reserved-folder bare-metal crate; different
    #   runtime model (its .cargo/config.toml targets
    #   x86_64-unknown-none)
    "vendor-sel4-fs",
]

[profile.dev]
panic = "abort"     # Required for bare-metal evaluation

[profile.release]
opt-level = "z"     # Optimize for minimum binary size
lto = true          # Link-time optimization
panic = "abort"     # Strip panic unwinding overhead
