[workspace]
resolver = "2"
members = [
    "service-people",
    "service-content",
    "app-console-content",
    "tool-acs-miner",
    "system-gateway-mba",
    # "service-fs" — Tokio MCP-server skeleton compiles clean inside
    # its own directory (cargo check + 3 ledger unit tests pass,
    # 2026-04-26). Re-add to members blocked on workspace-tier
    # openssl-sys breakage in an existing member (pre-existing Layer
    # 1 audit finding; not the Tokio rewrite's fault). Tracked as a
    # NEXT.md item in service-fs/ pending repo-tier cleanup.
    "system-security",
    "xtask"
]
exclude = [
    # Held-out crates that physically nest under the workspace root
    # but are deliberately not workspace members.
    # - service-fs: see members comment above
    # - service-input: cargo crate scaffold landed 2026-04-26;
    #   re-add to [members] blocked behind the same openssl-sys
    #   Layer 1 audit issue as service-fs (pre-existing 2026-04-18
    #   audit finding in a sibling member)
    # - vendor-sel4-fs: Reserved-folder bare-metal crate; different
    #   runtime model (its .cargo/config.toml targets
    #   x86_64-unknown-none)
    "service-fs",
    "service-input",
    "vendor-sel4-fs",
]

[profile.dev]
panic = "abort"     # Required for bare-metal evaluation

[profile.release]
opt-level = "z"     # Optimize for minimum binary size
lto = true          # Link-time optimization
panic = "abort"     # Strip panic unwinding overhead
