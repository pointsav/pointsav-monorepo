[package]
name = "master-harvester-rs"
version = "2.0.0"
edition = "2021"
authors = ["PointSav Digital Systems"]
description = "Event-Driven Ingress Diode. Enforces strict micro-batching and immutable storage."

[workspace]

[dependencies]
tokio = { version = "1.32", features = ["full"] }
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenv = "0.15"
uuid = { version = "1.4", features = ["v4"] }
