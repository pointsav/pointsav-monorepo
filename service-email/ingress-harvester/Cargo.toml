[package]
name = "ingress-harvester"
version = "1.0.0"
edition = "2021"

[workspace]

[dependencies]
reqwest = { version = "0.11", default-features = false, features = ["rustls-tls", "json"] }
tokio = { version = "1.32", features = ["full"] }
base64 = "0.21"
regex = "1.10"
uuid = { version = "1.4", features = ["v4"] }
chrono = "0.4"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
