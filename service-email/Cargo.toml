[package]
name = "service-email"
version = "0.1.0"
edition = "2021"
description = "Sovereign bridge for Microsoft Exchange to Maildir conversion."

[dependencies]
tokio = { version = "1.35", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.6", features = ["v4"] }
chrono = "0.4"
