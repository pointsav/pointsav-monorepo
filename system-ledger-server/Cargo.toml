[package]
name = "system-ledger-server"
version = "0.1.0"
edition = "2021"
rust-version = "1.73"
description = "Unix socket daemon that exposes InMemoryLedger consultation over a length-prefixed postcard transport. Runs on the NetBSD compat bottom. Shares the system-ledger-proto wire format with system-ledger-pd (seL4 native bottom)."
license = "AGPL-3.0-or-later"
repository = "https://github.com/pointsav/pointsav-monorepo"
keywords = ["capability", "ledger", "daemon", "unix-socket"]
categories = ["cryptography", "network-programming"]

[[bin]]
name = "system-ledger-server"
path = "src/main.rs"

[dependencies]
system-core         = { path = "../system-core" }
system-ledger       = { path = "../system-ledger" }
system-ledger-proto = { path = "../system-ledger-proto" }
tokio    = { version = "1", features = ["full"] }
postcard = { version = "1", features = ["use-std"] }
ciborium = { version = "0.2" }

[dev-dependencies]
ed25519-dalek = { version = "2", default-features = false, features = ["std"] }
serde         = { version = "1", default-features = false, features = ["derive"] }
