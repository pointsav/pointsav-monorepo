[package]
name = "service-email-batch-ingress"
version = "0.2.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full", "signal"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.3", features = ["v4"] }
chrono = "0.4"
