# Nginx TLS reverse proxy for the Yo-Yo vLLM server.
# Listens on port 9443 (HTTPS) — only the workspace VM's IP is allowed through
# the GCP firewall rule declared in compute/opentofu/main.tf.
#
# Bearer token auth: the auth map is written at boot by rc.local (reads the
# token from GCP instance metadata attribute "bearer-token").  Until rc.local
# has run, requests return 403.  /health and /metrics are exempt from auth so
# the Doorman health probe and idle monitor work without credentials.

# Auth map populated at boot via rc.local → /etc/nginx/conf.d/yoyo-auth-map.conf
# Default: deny all.  rc.local inserts the real token once metadata is available.
map $http_authorization $auth_ok {
    default 0;
}

server {
    listen 9443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/yoyo.crt;
    ssl_certificate_key /etc/nginx/ssl/yoyo.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Health endpoint — no auth required (Doorman health probe + idle monitor).
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_read_timeout 10s;
    }

    # Metrics endpoint — no auth required (idle monitor polls for active slots).
    location = /metrics {
        proxy_pass http://127.0.0.1:8000/metrics;
        proxy_read_timeout 10s;
    }

    # All other endpoints require a valid bearer token.
    location / {
        if ($auth_ok = 0) {
            return 403;
        }
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }
}
