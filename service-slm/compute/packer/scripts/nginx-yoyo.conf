# Nginx TLS reverse proxy for the Yo-Yo vLLM server.
# Listens on port 9443 (HTTPS) — only the workspace VM's IP is allowed through
# the GCP firewall rule declared in compute/opentofu/main.tf.
#
# Bearer token auth: the map is written at boot by rc.local into
# /etc/nginx/conf.d/yoyo-auth-map.conf.  A default deny-all map is written
# during provisioning so nginx starts cleanly before rc.local runs.
# /health and /metrics are exempt from auth.

server {
    listen 9443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/yoyo.crt;
    ssl_certificate_key /etc/nginx/ssl/yoyo.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Health endpoint — no auth required (Doorman health probe + idle monitor).
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_read_timeout 10s;
    }

    # Metrics endpoint — no auth required (idle monitor polls for active slots).
    location = /metrics {
        proxy_pass http://127.0.0.1:8000/metrics;
        proxy_read_timeout 10s;
    }

    # All other endpoints require a valid bearer token.
    location / {
        if ($auth_ok = 0) {
            return 403;
        }
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }
}
