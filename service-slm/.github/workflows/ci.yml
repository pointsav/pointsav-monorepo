# Primary CI workflow. Runs on every push and every PR to main.

name: ci

on:
  push:
    branches: [main]
    paths:
      - "service-slm/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "service-slm/**"
      - ".github/workflows/**"

defaults:
  run:
    working-directory: service-slm

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: service-slm
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: service-slm
      - run: cargo test --workspace --all-features

  agents-parity:
    name: CLAUDE.md / AGENTS.md parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask verify-agents-parity

  reuse:
    name: REUSE compliance (SPDX headers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: REUSE lint
        uses: fsfe/reuse-action@v3
        with:
          args: --root service-slm lint
