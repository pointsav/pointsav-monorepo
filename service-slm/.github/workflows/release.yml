#
# Release workflow. Triggered by pushing a tag matching `service-slm-v*`.
# Produces:
#   - Cross-compiled binaries (linux x86_64, linux aarch64, macOS universal).
#   - SBOM (CycloneDX JSON).
#   - THIRD-PARTY-NOTICES.md.
#   - Sigstore keyless signature bundle.
#   - SLSA provenance attestation.
#
# Phase 2 scaffolding: this workflow is structurally correct but will not
# be exercised until the first real release. Review before first tag push.

name: release

on:
  push:
    tags:
      - "service-slm-v*"

permissions:
  contents: write
  id-token: write        # required by Sigstore keyless
  attestations: write

defaults:
  run:
    working-directory: service-slm

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: service-slm
      - run: cargo build --release --target ${{ matrix.target }} --bin slm-cli
      - uses: actions/upload-artifact@v4
        with:
          name: slm-cli-${{ matrix.target }}
          path: service-slm/target/${{ matrix.target }}/release/slm-cli

  sbom:
    name: SBOM + third-party notices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-sbom cargo-about
      - run: cargo sbom > service-slm-sbom.json
      - run: cargo about generate about.hbs > THIRD-PARTY-NOTICES.md || echo "about.hbs template missing; wire in Phase 2"
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-and-notices
          path: |
            service-slm/service-slm-sbom.json
            service-slm/THIRD-PARTY-NOTICES.md

  sign-and-release:
    name: sign + release
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign each artifact (keyless via OIDC)
        run: |
          for f in artifacts/slm-cli-*/slm-cli; do
            cosign sign-blob --yes --output-signature "$f.sig" --output-certificate "$f.pem" "$f"
          done
      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "artifacts/slm-cli-*/slm-cli"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
