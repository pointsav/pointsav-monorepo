name: Bug report
description: A defect in service-slm.
title: "[bug] <short description>"
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Do not** use this template for security
        vulnerabilities — see [SECURITY.md](../SECURITY.md) instead.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `slm-cli --version`, or commit SHA.
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the exact command you ran, the observed output, and the expected output.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Smallest sequence that triggers the bug.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust toolchain version, relevant config.
    validations:
      required: false
