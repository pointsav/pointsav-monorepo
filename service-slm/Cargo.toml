#
# Workspace root for service-slm.
#
# The member list mirrors SLM-STACK §5.1. The [workspace.dependencies] block
# mirrors SLM-STACK §11 with indicative minimum versions; pin to latest at the
# start of each phase and bump via dependabot thereafter.

[workspace]
resolver = "2"
members = [
    "crates/slm-core",
    "crates/slm-doorman",
    "crates/slm-ledger",
    "crates/slm-compute",
    "crates/slm-memory-kv",
    "crates/slm-memory-adapters",
    "crates/slm-inference-local",
    "crates/slm-inference-remote",
    "crates/slm-api",
    "crates/slm-cli",
    "xtask",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
authors = ["Woodfine Capital Projects Inc. <peter@woodfinegroup.com>"]
license = "AGPL-3.0-only"
repository = "https://github.com/woodfinegroup/pointsav-monorepo"
homepage = "https://github.com/woodfinegroup/pointsav-monorepo/tree/main/service-slm"
readme = "README.md"
description = "PointSav doorman and yo-yo compute substrate. See service-slm/README.md."
keywords = ["pointsav", "llm", "doorman", "ledger", "soc3"]
categories = ["command-line-utilities", "web-programming::http-server"]

[workspace.dependencies]
# ─── HTTP / async ──────────────────────────────────────────────────────────
axum = "0.8"
tower = "0.5"
tokio = { version = "1.40", features = ["full"] }
hyper = "1.5"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tonic = "0.12"

# ─── Storage ───────────────────────────────────────────────────────────────
sqlx = { version = "0.8", default-features = false, features = ["sqlite", "runtime-tokio-rustls", "macros"] }
sled = "0.34"
object_store = { version = "0.11", default-features = false, features = ["gcp", "aws"] }

# ─── LadybugDB bindings ─────────────────────────────────────────────────────
# TODO: confirm at Phase 2 kickoff. `kuzu` is the present Rust API; swap to
# `ladybug` or `lbug` when published.
kuzu = "0.11"

# ─── Inference (mistral.rs replaces vLLM per SLM-STACK §3.1, ADR-0002) ─────
# TODO: confirm at Phase 2 kickoff that CUDA features compile on target hosts.
mistralrs = { version = "0.8", default-features = false, features = ["cuda", "flash-attn"] }
candle-core = "0.9"
candle-nn = "0.9"

# ─── Document processing ───────────────────────────────────────────────────
oxidize-pdf = "2.5"
docx-rust = "0.3"
pulldown-cmark = "0.12"
calamine = "0.26"

# ─── Orchestration ─────────────────────────────────────────────────────────
apalis = { version = "0.7", features = ["limit"] }
apalis-sqlite = "0.7"
apalis-workflow = "0.1"
backoff = "0.4"
tokio-cron-scheduler = "0.11"

# ─── Networking, SSH, cloud ────────────────────────────────────────────────
russh = "0.46"
rustls = "0.23"
# TODO: confirm crate names and versions once Phase 2 vendor SDKs are selected.
google-cloud-storage = "0.23"
# google-cloud-run is not yet on crates.io as of writing; track upstream.

# ─── Serde + validation ────────────────────────────────────────────────────
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
validator = { version = "0.19", features = ["derive"] }
schemars = "0.8"

# ─── Observability ─────────────────────────────────────────────────────────
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
opentelemetry = "0.27"
metrics = "0.24"
metrics-exporter-prometheus = "0.16"

# ─── Supply-chain signing ──────────────────────────────────────────────────
sigstore = "0.10"

# ─── Errors ────────────────────────────────────────────────────────────────
anyhow = "1"
thiserror = "2"

# ─── CLI ────────────────────────────────────────────────────────────────────
clap = { version = "4.5", features = ["derive", "env", "wrap_help"] }

# ─── Time, IDs, hashing ─────────────────────────────────────────────────────
chrono = { version = "0.4", default-features = false, features = ["serde", "std", "clock"] }
uuid = { version = "1.11", features = ["v7", "serde"] }
blake3 = "1.5"
sha2 = "0.10"

# ─── Test-only ─────────────────────────────────────────────────────────────
# (declared here so crates share versions; never a default feature)
tokio-test = "0.4"
proptest = "1.5"
tempfile = "3.12"
insta = { version = "1.41", features = ["yaml", "json"] }

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
debug = false

[profile.release-with-debug]
inherits = "release"
strip = "none"
debug = true
