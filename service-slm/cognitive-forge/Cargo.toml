[package]
name = "cognitive-forge"
version = "1.0.0"
edition = "2021"

[workspace]

[dependencies]
tokio = { version = "1.32", features = ["full"] }
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
