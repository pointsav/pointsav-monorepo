[package]
name = "slm-doorman-server"
version = "0.1.0"
description = "HTTP entry point for the service-slm Doorman."
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "slm-doorman-server"
path = "src/main.rs"

[lib]
name = "slm_doorman_server"
path = "src/lib.rs"

[dependencies]
slm-core = { workspace = true }
slm-doorman = { workspace = true }

tokio = { workspace = true }
axum = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }

chrono = { workspace = true }

# Graph proxy handlers forward requests to service-content.
reqwest = { workspace = true }

tracing = { workspace = true }
tracing-subscriber = { workspace = true }

anyhow = { workspace = true }

# File locking for the brief queue (apprenticeship-substrate.md §7C).
# Already a workspace dep used by slm-doorman for the promotion ledger;
# re-declared here explicitly so the server crate does not rely on
# transitive resolution for a direct dependency.
fs2 = { version = "0.4" }

[dev-dependencies]
# Integration test framework — test axum routes without binding a port.
# Uses tower::ServiceExt::oneshot + axum::body::Body (both already
# transitive workspace deps; listed here to make them explicit for tests).
tower = { version = "0.5", features = ["util"] }
# Mock HTTP server — same dep used by slm-doorman for Yo-Yo / Tier C tests.
wiremock = "0.6"
tokio = { workspace = true }
serde_json = { workspace = true }
# Async trait support for MockVerifier in tests.
async-trait = { workspace = true }
# Base64 encoding for verdict wire tests (signature blob transport).
base64 = { workspace = true }
# Chrono for ApprenticeshipAttempt/Brief construction in tests.
chrono = { workspace = true }
