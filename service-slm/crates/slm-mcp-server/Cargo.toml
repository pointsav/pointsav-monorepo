[package]
name = "slm-mcp-server"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Foundry MCP server — exposes DataGraph, corpus, and Doorman tools via Model Context Protocol"

[[bin]]
name = "slm-mcp-server"
path = "src/main.rs"

[dependencies]
rmcp = { version = "1.7.0", features = ["macros", "server", "transport-io"] }
schemars = "1.0"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
reqwest = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
