[package]
name = "slm-inference-remote"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Remote GCP yo-yo inference driver for service-slm."
readme = "README.md"
publish = false

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"

[dependencies]
slm-core = { path = "../slm-core" }
slm-ledger = { path = "../slm-ledger" }
reqwest.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
tracing.workspace = true
thiserror.workspace = true

[dev-dependencies]
tokio-test.workspace = true
tempfile.workspace = true
wiremock.workspace = true
# Matches slm-ledger's pin (1.3) — used only to read the ledger file back
# in integration tests. slm-ledger has no reader API yet; adding one is
# out of scope for task [20].
csv = "1.3"
