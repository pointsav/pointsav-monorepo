[package]
name = "system-ledger"
version = "1.0.0"
edition = "2021"
rust-version = "1.73"
description = "Kernel-side state machine for the Capability Ledger Substrate: LRU checkpoint cache, revocation set, apex history with post-handover invariant, and proof-verified witness record application."
license = "AGPL-3.0-or-later"
repository = "https://github.com/pointsav/pointsav-monorepo"
keywords = ["ledger", "capability", "merkle", "substrate", "cache"]
categories = ["cryptography", "data-structures"]

[dependencies]
system-core = { path = "../system-core" }
tempfile = "3"
sha2 = "0.10"
serde_json = "1"

[dev-dependencies]
ed25519-dalek = { version = "2", default-features = false, features = ["std"] }
criterion = { version = "0.5", default-features = false, features = ["plotters", "cargo_bench_support"] }

[[bench]]
name = "consult"
harness = false
