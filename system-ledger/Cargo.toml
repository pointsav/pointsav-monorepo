[package]
name = "system-ledger"
version = "1.0.0"
edition = "2021"
rust-version = "1.73"
description = "Kernel-side state machine for the Capability Ledger Substrate: LRU checkpoint cache, revocation set, apex history with post-handover invariant, and proof-verified witness record application."
license = "AGPL-3.0-or-later"
repository = "https://github.com/pointsav/pointsav-monorepo"
keywords = ["ledger", "capability", "merkle", "substrate", "cache"]
categories = ["cryptography", "data-structures"]

[workspace]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[features]
default = ["std"]
std  = ["system-core/std", "sha2/std", "dep:serde_json", "dep:tempfile"]
sel4 = ["alloc", "system-core/sel4", "sha2/force-soft", "dep:ed25519-dalek", "dep:base64"]
alloc = ["system-core/alloc"]

[dependencies]
system-core   = { path = "../system-core", default-features = false }
sha2          = { version = "0.10", default-features = false }
ciborium      = { version = "0.2", default-features = false }
serde_json    = { version = "1", optional = true }
tempfile      = { version = "3", optional = true }
ed25519-dalek = { version = "2", default-features = false, optional = true }
base64        = { version = "0.22", default-features = false, optional = true }

[dev-dependencies]
ed25519-dalek = { version = "2", default-features = false, features = ["std"] }
criterion = { version = "0.5", default-features = false, features = ["plotters", "cargo_bench_support"] }

[[bench]]
name = "consult"
harness = false
