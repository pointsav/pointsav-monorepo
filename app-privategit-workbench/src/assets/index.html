<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foundry Workbench</title>
<style>
:root {
  --bg: #fafafa; --bg2: #f0f0f0; --bg3: #e8e8e8;
  --fg: #24292e; --fg2: #586069; --fg3: #959da5;
  --accent: #0066cc; --accent-bg: #e8f0fe;
  --border: #d0d7de; --danger: #cf222e;
  --row-h: 22px; --sb-w: 280px; --pv-w: 380px;
}
[data-theme="dark"] {
  --bg: #1e1e1e; --bg2: #252526; --bg3: #3c3c3c;
  --fg: #d4d4d4; --fg2: #abb2bf; --fg3: #6a737d;
  --accent: #4d9fff; --accent-bg: #0d3a5c;
  --border: #333; --danger: #f85149;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       background: var(--bg); color: var(--fg); display: flex; flex-direction: column;
       height: 100vh; overflow: hidden; }
button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }

/* Header */
#hdr { background: var(--bg2); border-bottom: 1px solid var(--border);
       padding: 6px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#hdr h1 { font-size: 12px; font-weight: 600; letter-spacing: .04em; }
#hdr .spacer { flex: 1; }
#hdr button { padding: 3px 8px; border-radius: 4px; font-size: 12px; }
#hdr button:hover { background: var(--bg3); }
#save-btn { color: var(--accent); font-weight: 600; }
#save-btn.dirty::after { content: "•"; margin-left: 2px; }
#theme-btn { font-size: 15px; }
#status-bar { font-size: 11px; color: var(--fg3); }

/* Layout */
#layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
#sb { width: var(--sb-w); background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0; min-width: 160px; }
#schema-bar { display: flex; flex-wrap: wrap; gap: 2px; padding: 6px;
              border-bottom: 1px solid var(--border); flex-shrink: 0; }
#schema-bar button { font-size: 11px; padding: 3px 7px; border-radius: 3px;
                     color: var(--fg2); }
#schema-bar button:hover { background: var(--bg3); }
#schema-bar button.active { background: var(--accent-bg); color: var(--accent);
                             font-weight: 600; }
#tree-wrap { flex: 1; overflow: hidden; position: relative; }
#tree-spacer-top { pointer-events: none; }
#tree { overflow-y: auto; height: 100%; }
.tree-row { display: flex; align-items: center; height: var(--row-h);
            padding-right: 8px; white-space: nowrap; user-select: none;
            cursor: pointer; font-size: 12px; }
.tree-row:hover { background: var(--bg3); }
.tree-row.selected { background: var(--accent-bg); color: var(--accent); }
.tree-row .indent { display: inline-block; width: 12px; flex-shrink: 0; }
.tree-row .icon { width: 14px; text-align: center; flex-shrink: 0; margin-right: 4px; }
.tree-row .name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.tree-row .badge { font-size: 10px; margin-left: 4px; color: var(--fg3); }
.tree-row.modified .badge { color: #e5a84f; }

/* Resizers */
.resizer { width: 4px; background: var(--border); cursor: col-resize; flex-shrink: 0; }
.resizer:hover, .resizer.dragging { background: var(--accent); }

/* Editor pane */
#ed { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 200px; }
#ed-toolbar { background: var(--bg2); border-bottom: 1px solid var(--border);
              padding: 4px 8px; font-size: 11px; color: var(--fg3); flex-shrink: 0;
              display: flex; align-items: center; gap: 8px; }
#ed-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#editor { flex: 1; width: 100%; background: var(--bg); color: var(--fg);
          border: none; outline: none; resize: none; font: 13px/1.5 "Fira Code",monospace;
          padding: 12px 16px; tab-size: 2; }
#viewer { flex: 1; overflow: hidden; }
#viewer iframe { width: 100%; height: 100%; border: none; }
#viewer pre { margin: 0; padding: 12px 16px; overflow: auto; height: 100%;
              font: 12px/1.5 "Fira Code",monospace; white-space: pre-wrap; }

/* Preview pane */
#pv { width: var(--pv-w); background: var(--bg); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; min-width: 120px; }
#pv-toolbar { background: var(--bg2); border-bottom: 1px solid var(--border);
              padding: 4px 8px; font-size: 11px; color: var(--fg3); flex-shrink: 0; }
#pv-content { flex: 1; overflow: auto; padding: 12px 16px; font-size: 13px; }
#pv-content iframe { width: 100%; height: 100%; border: none; }

/* Section highlight */
.section-highlight { background: rgba(0,102,204,.08); outline: 1px solid rgba(0,102,204,.3); }
</style>
</head>
<body>
<div id="hdr">
  <h1>Foundry Workbench</h1>
  <span id="status-bar">Ready</span>
  <div class="spacer"></div>
  <button id="save-btn" onclick="saveFile()">Save</button>
  <button id="theme-btn" onclick="toggleTheme()" title="Toggle theme">☀</button>
</div>
<div id="layout">
  <aside id="sb">
    <div id="schema-bar">
      <button data-schema="files"        class="active">Files</button>
      <button data-schema="memo"                       >Memo</button>
      <button data-schema="code"                       >Code</button>
      <button data-schema="proforma"                   >Proforma</button>
      <button data-schema="presentation"               >Slides</button>
      <button data-schema="schedule"                   >Schedule</button>
      <button data-schema="pdf"                        >PDF</button>
      <button data-schema="gis"                        >GIS</button>
      <button data-schema="bim"                        >BIM</button>
    </div>
    <div id="tree-wrap">
      <div id="tree"></div>
    </div>
  </aside>
  <div class="resizer" id="rsz-sb"></div>
  <main id="ed">
    <div id="ed-toolbar">
      <span id="ed-path">No file open</span>
      <span id="ed-mtime"></span>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Select a file to open…"></textarea>
    <div id="viewer" style="display:none">
      <iframe id="viewer-frame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </main>
  <div class="resizer" id="rsz-pv"></div>
  <aside id="pv">
    <div id="pv-toolbar">Preview</div>
    <div id="pv-content"><p style="color:var(--fg3);padding:16px;">No file open.</p></div>
  </aside>
</div>

<script>
'use strict';
// ---------------------------------------------------------------------------
// Theme
// ---------------------------------------------------------------------------
const ROOT = document.documentElement;
function applyTheme(t) {
  ROOT.setAttribute('data-theme', t);
  document.getElementById('theme-btn').textContent = t === 'dark' ? '🌙' : '☀';
  localStorage.setItem('wp-theme', t);
}
function toggleTheme() {
  applyTheme(ROOT.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
applyTheme(localStorage.getItem('wp-theme') || 'light');

// ---------------------------------------------------------------------------
// Schema
// ---------------------------------------------------------------------------
const SCHEMAS = {
  files:        { ext: null,      write: true,  viewer: 'text' },
  memo:         { ext: '.html',   write: true,  viewer: 'iframe' },
  code:         { ext: null,      write: true,  viewer: 'text' },
  proforma:     { ext: '.json',   write: false, viewer: 'json' },
  presentation: { ext: '.json',   write: false, viewer: 'json' },
  schedule:     { ext: '.tjp',    write: false, viewer: 'text' },
  pdf:          { ext: '.pdf',    write: false, viewer: 'pdf' },
  gis:          { ext: '.geojson',write: false, viewer: 'json' },
  bim:          { ext: '.bim.json',write: false,viewer: 'json' },
};
let activeSchema = 'files';
document.getElementById('schema-bar').addEventListener('click', e => {
  const btn = e.target.closest('[data-schema]');
  if (!btn) return;
  activeSchema = btn.dataset.schema;
  document.querySelectorAll('#schema-bar button').forEach(b => b.classList.toggle('active', b === btn));
  refreshTree();
});

// ---------------------------------------------------------------------------
// File tree state
// ---------------------------------------------------------------------------
let treeItems = [];   // [{path, name, isDir, depth, expanded, gitStatus}]
let selectedPath = null;
let openMtime = 0;

const TREE_EL = document.getElementById('tree');
const ROW_H = 22;

async function refreshTree() {
  try {
    const res = await fetch('/file?path=');
    if (!res.ok) return;
    const data = await res.json();
    const schema = SCHEMAS[activeSchema];
    const items = (data.entries || []).filter(e => {
      if (e.is_dir) return true;
      if (!schema.ext) return true;
      return e.name.endsWith(schema.ext);
    });
    treeItems = buildTree(items, '');
    renderTree();
  } catch(err) { setStatus('Tree load error: ' + err.message); }
}

function buildTree(entries, prefix) {
  return entries.map(e => ({
    path: (prefix ? prefix + '/' : '') + e.name,
    name: e.name,
    isDir: !!e.is_dir,
    depth: 0,
    expanded: false,
    gitStatus: e.git_status || '',
  }));
}

function renderTree() {
  const rows = treeItems;
  TREE_EL.innerHTML = '';
  rows.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'tree-row' + (item.path === selectedPath ? ' selected' : '');
    if (item.gitStatus) div.classList.add('modified');
    const indent = '&nbsp;'.repeat(item.depth * 2);
    const icon = item.isDir ? (item.expanded ? '▾' : '▸') : '·';
    div.innerHTML = `<span class="indent">${indent}</span><span class="icon">${icon}</span>`
      + `<span class="name">${esc(item.name)}</span>`
      + (item.gitStatus ? `<span class="badge">${esc(item.gitStatus)}</span>` : '');
    div.addEventListener('click', () => onTreeClick(item, i));
    TREE_EL.appendChild(div);
  });
}

async function onTreeClick(item, idx) {
  if (item.isDir) {
    item.expanded = !item.expanded;
    if (item.expanded) await loadDirChildren(item, idx);
    else removeDirChildren(item, idx);
    renderTree();
    return;
  }
  selectedPath = item.path;
  renderTree();
  openFilePath(item.path);
}

async function loadDirChildren(dir, idx) {
  try {
    const res = await fetch(`/file?path=${encodeURIComponent(dir.path)}`);
    if (!res.ok) return;
    const data = await res.json();
    const schema = SCHEMAS[activeSchema];
    const children = (data.entries || []).filter(e =>
      e.is_dir || !schema.ext || e.name.endsWith(schema.ext)
    ).map(e => ({
      path: dir.path + '/' + e.name,
      name: e.name,
      isDir: !!e.is_dir,
      depth: dir.depth + 1,
      expanded: false,
      gitStatus: e.git_status || '',
    }));
    treeItems.splice(idx + 1, 0, ...children);
  } catch(e) {}
}

function removeDirChildren(dir, idx) {
  let i = idx + 1;
  while (i < treeItems.length && treeItems[i].depth > dir.depth) i++;
  treeItems.splice(idx + 1, i - idx - 1);
}

// ---------------------------------------------------------------------------
// File open / edit / save
// ---------------------------------------------------------------------------
const EDITOR = document.getElementById('editor');
const VIEWER = document.getElementById('viewer');
const VIEWER_FRAME = document.getElementById('viewer-frame');
const ED_PATH = document.getElementById('ed-path');
const ED_MTIME = document.getElementById('ed-mtime');
const SAVE_BTN = document.getElementById('save-btn');
let dirty = false;

function markDirty(v) { dirty = v; SAVE_BTN.classList.toggle('dirty', v); }

async function openFilePath(urlPath) {
  setStatus(`Opening ${urlPath}…`);
  try {
    const res = await fetch(`/file?path=${encodeURIComponent(urlPath)}`);
    if (!res.ok) { setStatus(`Error ${res.status}`); return; }
    const data = await res.json();
    const content = data.content ?? '';
    openMtime = data.mtime ?? 0;
    ED_PATH.textContent = urlPath;
    ED_MTIME.textContent = openMtime ? new Date(openMtime * 1000).toLocaleTimeString() : '';
    localStorage.setItem('wp-tab', urlPath);

    const schema = SCHEMAS[activeSchema];
    if (schema.viewer === 'iframe' || urlPath.endsWith('.html')) {
      EDITOR.style.display = 'none';
      VIEWER.style.display = 'flex';
      VIEWER_FRAME.srcdoc = content;
    } else {
      EDITOR.style.display = '';
      VIEWER.style.display = 'none';
      EDITOR.value = content;
    }
    markDirty(false);
    setStatus('');
    updatePreview(urlPath, content);
  } catch(e) { setStatus('Open error: ' + e.message); }
}

EDITOR.addEventListener('input', () => markDirty(true));
EDITOR.addEventListener('click', onEditorClick);

async function onEditorClick() {
  if (!selectedPath) return;
  const offset = EDITOR.selectionStart;
  try {
    const res = await fetch(`/section?path=${encodeURIComponent(selectedPath)}&offset=${offset}`);
    if (!res.ok) return;
    const { start, end, block_kind } = await res.json();
    setStatus(`Block: ${block_kind} [${start}–${end}]`);
  } catch(e) {}
}

async function saveFile() {
  if (!selectedPath || !dirty) return;
  const content = EDITOR.value;
  setStatus('Saving…');
  try {
    const res = await fetch(`/file?path=${encodeURIComponent(selectedPath)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'text/plain; charset=utf-8',
                 'X-Foundry-Mtime': String(openMtime) },
      body: content,
    });
    if (res.status === 409) { setStatus('Conflict — file changed externally; reload first.'); return; }
    if (!res.ok) { setStatus(`Save error ${res.status}`); return; }
    const data = await res.json();
    openMtime = data.mtime ?? openMtime;
    ED_MTIME.textContent = new Date(openMtime * 1000).toLocaleTimeString();
    markDirty(false);
    setStatus('Saved');
    updatePreview(selectedPath, content);
  } catch(e) { setStatus('Save error: ' + e.message); }
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(); }
});

// ---------------------------------------------------------------------------
// Preview pane
// ---------------------------------------------------------------------------
const PV_CONTENT = document.getElementById('pv-content');
const PV_TOOLBAR = document.getElementById('pv-toolbar');

function updatePreview(urlPath, content) {
  if (!content) { PV_CONTENT.innerHTML = '<p style="color:var(--fg3);padding:16px;">Empty file.</p>'; return; }
  if (urlPath.endsWith('.md')) {
    PV_CONTENT.innerHTML = `<pre style="white-space:pre-wrap;word-break:break-word">${esc(content)}</pre>`;
    PV_TOOLBAR.textContent = 'Markdown';
  } else if (urlPath.endsWith('.html')) {
    PV_CONTENT.innerHTML = `<iframe srcdoc="${esc(content)}" style="width:100%;height:100%;border:none"></iframe>`;
    PV_TOOLBAR.textContent = 'HTML Preview';
  } else if (urlPath.endsWith('.json') || urlPath.endsWith('.geojson')) {
    try {
      const obj = JSON.parse(content);
      PV_CONTENT.innerHTML = `<pre>${esc(JSON.stringify(obj, null, 2))}</pre>`;
    } catch { PV_CONTENT.innerHTML = `<pre>${esc(content)}</pre>`; }
    PV_TOOLBAR.textContent = 'JSON';
  } else {
    PV_CONTENT.innerHTML = `<pre style="white-space:pre-wrap">${esc(content.slice(0, 4000))}</pre>`;
    PV_TOOLBAR.textContent = 'Text';
  }
}

// ---------------------------------------------------------------------------
// SSE — external change notifications
// ---------------------------------------------------------------------------
function connectSSE() {
  const es = new EventSource('/events');
  es.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.event === 'changed' && d.path === selectedPath) {
        setStatus(`External change detected in ${d.path} — reload?`);
      }
    } catch {}
  };
  es.onerror = () => setTimeout(connectSSE, 5000);
}
connectSSE();

// ---------------------------------------------------------------------------
// Git status
// ---------------------------------------------------------------------------
async function refreshGitStatus() {
  try {
    const res = await fetch('/git-status');
    if (!res.ok) return;
    const data = await res.json();
    const byPath = {};
    (data.files || []).forEach(f => { byPath[f.path] = f.status; });
    treeItems.forEach(item => { item.gitStatus = byPath[item.path] || ''; });
    renderTree();
  } catch {}
}
setTimeout(refreshGitStatus, 2000);

// ---------------------------------------------------------------------------
// Resize handles
// ---------------------------------------------------------------------------
function makeResizer(id, getEl, getSize, setSize, minPx) {
  const rsz = document.getElementById(id);
  rsz.addEventListener('mousedown', e => {
    e.preventDefault();
    rsz.classList.add('dragging');
    const startX = e.clientX;
    const startSize = getSize();
    const move = ev => {
      const delta = ev.clientX - startX;
      setSize(Math.max(minPx, startSize + delta));
    };
    const up = () => {
      rsz.classList.remove('dragging');
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  });
}

const SB = document.getElementById('sb');
const PV = document.getElementById('pv');
makeResizer('rsz-sb', () => SB, () => SB.offsetWidth, w => SB.style.width = w + 'px', 120);
makeResizer('rsz-pv', () => PV, () => PV.offsetWidth, w => PV.style.width = w + 'px', 80);

// ---------------------------------------------------------------------------
// Activity logging
// ---------------------------------------------------------------------------
function logActivity(action, path) {
  navigator.sendBeacon('/activity', JSON.stringify({ action, path, ts: Date.now() }));
}

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
refreshTree();
const lastTab = localStorage.getItem('wp-tab');
if (lastTab) {
  selectedPath = lastTab;
  openFilePath(lastTab);
}
</script>
</body>
</html>
