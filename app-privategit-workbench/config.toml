# app-privategit-workbench runtime config
# Writable roots are declared here; the binary enforces root-containment security.
bind = "127.0.0.1:9210"
max_bytes = 2097152  # 2 MiB

[[root]]
url_prefix = "_sandbox-jennifer"
fs_path = "/home/jennifer/sandbox"
writable = true

[[root]]
url_prefix = "_clones/project-jennifer"
fs_path = "/srv/foundry/clones/project-jennifer"
writable = true
