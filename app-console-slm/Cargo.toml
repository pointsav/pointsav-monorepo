[package]
name = "app-console-slm"
version = "0.1.0"
edition = "2021"
authors = ["PointSav Digital Systems"]
description = "Sovereign operator console for the Foundry AI infrastructure — Doorman health, Yo-Yo controls, corpus and DataGraph panels."

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { version = "1", features = ["full"] }
