document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

24px;top:431px;width:112px;height:44px;line-height:1.2;flex-direction:column;font-size:10px;\">MCorp<span style=\"font-size:8.5px;color:var(--ink-3);font-weight:400;\">(Delaware)<\u002Fspan><\u002Fdiv>\n\n  <!-- WCP parent bar (296px = 3×96 + 2×4 gaps) + three children with 4px gaps -->\n  <div class=\"ebox green strong\" style=\"left:360px;top:369px;width:296px;height:30px;\">WCP<\u002Fdiv>\n  <div class=\"ebox green\" style=\"left:360px;top:431px;width:96px;height:44px;\">Benetti<\u002Fdiv>\n  <div class=\"ebox green\" style=\"left:460px;top:431px;width:96px;height:44px;\">Advisors<\u002Fdiv>\n  <div class=\"ebox green\" style=\"left:560px;top:431px;width:96px;height:44px;\">Credit<\u002Fdiv>\n\n  <!-- General Partner / Administrator — GOLD per swap -->\n  <div class=\"ebox gold\" style=\"left:716px;top:431px;width:112px;height:44px;font-size:10px;line-height:1.2;padding:0 6px;font-weight:500;\" data-cc-id=\"cc-1\">General Partner /<br>Administrator<\u002Fdiv>\n  <div class=\"ellipse\" style=\"left: 868px; top: 431px; width: 112px; height: 44px; text-align: center; font-size: 10px; line-height: 1.2; color: var(--ink); font-weight: 500; letter-spacing: normal; text-transform: none;\" data-cc-id=\"cc-2\">Direct-Hold<br>Solutions<\u002Fdiv>\n\n  <!-- TitleCos — recentered under ellipse -->\n  <div class=\"ebox grey\" style=\"left:652px;top:553px;width:88px;height:30px;\">TitleCo 1<\u002Fdiv>\n  <div class=\"ebox grey\" style=\"left:748px;top:553px;width:88px;height:30px;\">TitleCo 2<\u002Fdiv>\n  <div class=\"ebox grey\" style=\"left:844px;top:553px;width:88px;height:30px;\">TitleCo 3<\u002Fdiv>\n  <div class=\"ebox grey\" style=\"left:940px;top:553px;width:88px;height:30px;border-style:dashed;color:var(--ink-4);opacity:.55;font-size:14px;font-weight:400;\" title=\"additional TitleCos as required\">+<\u002Fdiv>\n\n  <!-- ============== SVG CONNECTORS ============== -->\n  <svg class=\"wires\" viewBox=\"0 0 1056 816\" preserveAspectRatio=\"none\">\n    <!-- zone separators removed per Option C refinement -->\n\n    <!-- WCP trunk down + fan-out to MCorp / Benetti / Advisors / Credit / GP-Admin -->\n    <line x1=\"508\" y1=\"399\" x2=\"508\" y2=\"413\"><\u002Fline>\n    <line x1=\"280\" y1=\"413\" x2=\"772\" y2=\"413\"><\u002Fline>\n    <line x1=\"280\" y1=\"413\" x2=\"280\" y2=\"431\"><\u002Fline>\n    <line x1=\"408\" y1=\"413\" x2=\"408\" y2=\"431\"><\u002Fline>\n    <line x1=\"508\" y1=\"413\" x2=\"508\" y2=\"431\"><\u002Fline>\n    <line x1=\"608\" y1=\"413\" x2=\"608\" y2=\"431\"><\u002Fline>\n    <line x1=\"772\" y1=\"413\" x2=\"772\" y2=\"431\"><\u002Fline>\n\n    <!-- GP-Admin -> Direct-Hold Solutions horizontal connector -->\n    <line x1=\"828\" y1=\"453\" x2=\"868\" y2=\"453\"><\u002Fline>\n\n    <!-- Direct-Hold Solutions fan-out to TitleCos -->\n    <line x1=\"924\" y1=\"475\" x2=\"924\" y2=\"541\"><\u002Fline>\n    <line x1=\"696\" y1=\"541\" x2=\"984\" y2=\"541\"><\u002Fline>\n    <line x1=\"696\" y1=\"541\" x2=\"696\" y2=\"553\"><\u002Fline>\n    <line x1=\"792\" y1=\"541\" x2=\"792\" y2=\"553\"><\u002Fline>\n    <line x1=\"888\" y1=\"541\" x2=\"888\" y2=\"553\"><\u002Fline>\n    <line x1=\"984\" y1=\"541\" x2=\"984\" y2=\"553\"><\u002Fline>\n  <\u002Fsvg>\n\n  <!-- ============== RECORD KEEPING BAND — Option A ============== -->\n  <div class=\"cat\" style=\"top:632px;\">Record Keeping<\u002Fdiv>\n  <div class=\"rk-row\">\n    <span>Receipts<\u002Fspan>\n    <span class=\"dot\">·<\u002Fspan>\n    <span>Invoices<\u002Fspan>\n    <span class=\"dot\">·<\u002Fspan>\n    <span>Forms<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ============== FOOTNOTES ============== -->\n  <div class=\"fn\" style=\"top:692px;left:56px;width:640px;\">\n    <sup>1<\u002Fsup>Each accountant is free to use any software, so long as MCorp receives <em>.CSV<\u002Fem> files.<br>\n    <sup>2<\u002Fsup>All consolidations require their own workbook with an individual <em>.CSV<\u002Fem> file.<br>\n    <sup>3<\u002Fsup>Record keeping to be completed by MCorp and/or the Local Building Manager.\n  <\u002Fdiv>\n\n  <!-- ============== SIGNATURE ============== -->\n  <div class=\"token-signature\">\n    April 27, 2026<br>\n    Prepared by Woodfine Management Corp.\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
<script>
/* ── Org Chart Drag-Editor v1 ─────────────────────────────────────── */
(function () {
  'use strict';
  const canvas = document.querySelector('.print-canvas') || document.querySelector('.sheet');
  if (!canvas) return;

  let editMode = false, dragging = null, selected = null, saveTimer = null;

  /* ── Toolbar ──────────────────────────────────────────────────── */
  const toolbar = document.createElement('div');
  toolbar.setAttribute('data-drag-ui','1');
  Object.assign(toolbar.style, {
    position:'fixed', top:'12px', right:'12px', zIndex:'9999',
    display:'flex', gap:'6px', alignItems:'center',
    background:'#1e1e1e', border:'1px solid #444', borderRadius:'6px',
    padding:'5px 10px', font:'700 11px/1 -apple-system,sans-serif',
    color:'#ccc', userSelect:'none', boxShadow:'0 2px 8px rgba(0,0,0,0.4)',
  });
  const editBtn = document.createElement('button');
  editBtn.textContent = '✏️ Edit Layout';
  Object.assign(editBtn.style, {
    background:'#333', border:'1px solid #555', color:'#ccc',
    cursor:'pointer', borderRadius:'4px', padding:'4px 8px',
    font:'700 11px/1 -apple-system,sans-serif',
  });
  const statusEl = document.createElement('span');
  Object.assign(statusEl.style, { fontSize:'10px', color:'#666', minWidth:'70px' });
  statusEl.setAttribute('data-drag-ui','1');
  const dupBtn = document.createElement('button');
  dupBtn.textContent = '⊕ Duplicate';
  dupBtn.setAttribute('data-drag-ui','1');
  Object.assign(dupBtn.style, {
    background:'#333', border:'1px solid #555', color:'#666',
    cursor:'pointer', borderRadius:'4px', padding:'4px 8px',
    font:'700 11px/1 -apple-system,sans-serif',
  });
  const delBtn = document.createElement('button');
  delBtn.textContent = '✕ Delete';
  delBtn.setAttribute('data-drag-ui','1');
  Object.assign(delBtn.style, {
    background:'#333', border:'1px solid #555', color:'#666',
    cursor:'pointer', borderRadius:'4px', padding:'4px 8px',
    font:'700 11px/1 -apple-system,sans-serif',
  });
  toolbar.append(editBtn, dupBtn, delBtn, statusEl);
  document.body.appendChild(toolbar);

  /* print: hide toolbar */
  const pStyle = document.createElement('style');
  pStyle.setAttribute('data-drag-ui','1');
  pStyle.textContent = '@media print{[data-drag-ui]{display:none!important}}';
  document.head.appendChild(pStyle);

  /* ── SVG path helpers ─────────────────────────────────────────── */
  function parsePts(d) {
    const re = /([ML])\s*([\d.+-]+)\s+([\d.+-]+)/g;
    const pts = []; let m;
    while ((m = re.exec(d)) !== null)
      pts.push({ cmd:m[1], x:parseFloat(m[2]), y:parseFloat(m[3]) });
    return pts;
  }
  function buildD(pts) { return pts.map(p => `${p.cmd} ${p.x} ${p.y}`).join(' '); }

  /* ── Connected SVG paths (detected on pickup) ─────────────────── */
  function findConnected(box) {
    const svgEl = canvas.querySelector('svg');
    if (!svgEl) return [];
    const cs = window.getComputedStyle(box);
    const bx=parseFloat(cs.left)||0, bw=parseFloat(cs.width)||0;
    const by=parseFloat(cs.top)||0,  bh=parseFloat(cs.height)||0;
    const PAD=30, result=[];
    svgEl.querySelectorAll('path[d]').forEach(path => {
      const pts = parsePts(path.getAttribute('d'));
      if (pts.length < 2) return;
      const s=pts[0], e=pts[pts.length-1];
      const hitS = s.x>=bx-PAD&&s.x<=bx+bw+PAD&&s.y>=by-PAD&&s.y<=by+bh+PAD;
      const hitE = e.x>=bx-PAD&&e.x<=bx+bw+PAD&&e.y>=by-PAD&&e.y<=by+bh+PAD;
      if (hitS||hitE) result.push({path,origPts:pts.map(p=>({...p})),hitS,hitE});
    });
    return result;
  }

  /* ── Update connected path endpoints ──────────────────────────── */
  function moveConnected(conn, dx, dy) {
    conn.forEach(({path,origPts,hitS,hitE}) => {
      const n=origPts.length, pts=origPts.map(p=>({...p}));
      if (hitS) {
        pts[0].x+=dx; pts[0].y+=dy;
        if (n>1) {
          if (Math.abs(origPts[1].y-origPts[0].y)<1) pts[1].y=pts[0].y;
          else                                        pts[1].x=pts[0].x;
        }
      }
      if (hitE) {
        pts[n-1].x+=dx; pts[n-1].y+=dy;
        if (n>1) {
          if (Math.abs(origPts[n-1].y-origPts[n-2].y)<1) pts[n-2].y=pts[n-1].y;
          else                                            pts[n-2].x=pts[n-1].x;
        }
      }
      path.setAttribute('d', buildD(pts));
    });
  }

  /* ── Selection highlight ──────────────────────────────────────── */
  function select(el) {
    if (selected===el) return;
    deselect();
    selected=el;
    if (el.tagName.toLowerCase()==='path') {
      el._sw = el.getAttribute('stroke-width')||'2';
      el.setAttribute('stroke-width', parseFloat(el._sw)+2);
      el.style.filter = 'drop-shadow(0 0 4px #4d9fff)';
    } else {
      el.style.outline = '2px solid #4d9fff';
      el.style.boxShadow = '0 0 10px rgba(77,159,255,.35)';
    }
  }
  function deselect() {
    if (!selected) return;
    const el=selected; selected=null;
    if (el.tagName.toLowerCase()==='path') {
      if (el._sw!==undefined) el.setAttribute('stroke-width',el._sw);
      el.style.filter='';
    } else { el.style.outline=''; el.style.boxShadow=''; }
  }

  /* ── Wire a box for drag ──────────────────────────────────────── */
  function wireBox(el) {
    el.addEventListener('mousedown', e => {
      if (!editMode||e.button!==0) return;
      e.stopPropagation();
      select(el);
      const cs=window.getComputedStyle(el);
      dragging={el, startX:e.clientX, startY:e.clientY,
        origLeft:parseFloat(cs.left)||0, origTop:parseFloat(cs.top)||0,
        conn:findConnected(el), isPath:false};
      el.style.cursor='grabbing';
      e.preventDefault();
    });
  }

  /* ── Wire a path for drag ─────────────────────────────────────── */
  function wirePath(path) {
    path.addEventListener('mousedown', e => {
      if (!editMode||e.button!==0) return;
      e.stopPropagation();
      select(path);
      dragging={el:path, startX:e.clientX, startY:e.clientY,
        origPts:parsePts(path.getAttribute('d')).map(p=>({...p})), isPath:true};
      path.style.cursor='grabbing';
      e.preventDefault();
    });
  }

  /* ── mousemove ────────────────────────────────────────────────── */
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx=e.clientX-dragging.startX, dy=e.clientY-dragging.startY;
    if (dragging.isPath) {
      dragging.el.setAttribute('d', buildD(dragging.origPts.map(p=>({cmd:p.cmd,x:p.x+dx,y:p.y+dy}))));
    } else {
      dragging.el.style.left=(dragging.origLeft+dx)+'px';
      dragging.el.style.top =(dragging.origTop +dy)+'px';
      moveConnected(dragging.conn,dx,dy);
    }
  });

  /* ── mouseup ──────────────────────────────────────────────────── */
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging.el.style.cursor='grab';
    dragging=null;
    scheduleSave();
  });

  /* ── Keyboard: escape to deselect, arrows to nudge ────────────── */
  document.addEventListener('keydown', e => {
    if (e.key==='Escape') { deselect(); return; }
    if ((e.ctrlKey||e.metaKey)&&e.key==='d'&&editMode&&selected&&selected.tagName.toLowerCase()!=='path') { e.preventDefault(); duplicateSelected(); return; }
    if ((e.key==='Delete'||e.key==='Backspace')&&editMode&&selected) { e.preventDefault(); deleteSelected(); return; }
    if (!editMode||!selected||selected.tagName.toLowerCase()==='path') return;
    const s=e.shiftKey?10:1;
    const l=parseFloat(selected.style.left)||0, t=parseFloat(selected.style.top)||0;
    const m={ArrowLeft:['left',l-s],ArrowRight:['left',l+s],ArrowUp:['top',t-s],ArrowDown:['top',t+s]};
    if (m[e.key]) { selected.style[m[e.key][0]]=m[e.key][1]+'px'; e.preventDefault(); scheduleSave(); }
  });

  /* canvas background click → deselect */
  canvas.addEventListener('mousedown', e => { if (e.target===canvas||e.target.tagName?.toLowerCase()==='svg') deselect(); });

  /* ── Toggle edit mode ─────────────────────────────────────────── */
  function setEditMode(on) {
    editMode=on;
    editBtn.textContent=on?'✅ Editing':'✏️ Edit Layout';
    editBtn.style.color=on?'#89d185':'#ccc';
    editBtn.style.borderColor=on?'#89d185':'#555';
    const svgEl=canvas.querySelector('svg');
    canvas.querySelectorAll('*').forEach(el => {
    if (el.tagName.toLowerCase()==='svg') return;
      if (window.getComputedStyle(el).position==='absolute')
        el.style.cursor=on?'grab':'';
    });
    if (svgEl) {
      svgEl.style.pointerEvents=on?'all':'';
      svgEl.querySelectorAll('path[d]').forEach(p => {
        p.style.cursor=on?'grab':'';
        p.style.pointerEvents=on?'stroke':'';
      });
    }
    dupBtn.style.color=on?'#ccc':'#666';
    dupBtn.style.borderColor=on?'#555':'#444';
    delBtn.style.color=on?'#ccc':'#666';
    delBtn.style.borderColor=on?'#555':'#444';
    if (!on) deselect();
  }
  editBtn.addEventListener('click', () => setEditMode(!editMode));

  /* ── Wire up all abs-positioned elements + SVG paths ─────────── */
  canvas.querySelectorAll('*').forEach(el => {
    if (el.tagName.toLowerCase()==='svg') return;
    if (window.getComputedStyle(el).position==='absolute') wireBox(el);
  });
  const svgEl=canvas.querySelector('svg');
  if (svgEl) svgEl.querySelectorAll('path[d]').forEach(wirePath);

  /* ── Auto-save ────────────────────────────────────────────────── */
  /* ── Duplicate selected box ───────────────────────────────── */
  function duplicateSelected() {
    if (!selected||selected.tagName.toLowerCase()==='path') return;
    const clone=selected.cloneNode(true);
    clone.style.left=(parseFloat(selected.style.left)||0)+20+'px';
    clone.style.top =(parseFloat(selected.style.top )||0)+20+'px';
    canvas.appendChild(clone);
    wireBox(clone);
    deselect();
    select(clone);
    scheduleSave();
  }
  function deleteSelected() {
    if (!selected) return;
    if (selected.tagName.toLowerCase()==='path') {
      selected.remove();
      deselect();
    } else {
      findConnected(selected).forEach(({path}) => path.remove());
      selected.remove();
      deselect();
    }
    scheduleSave();
  }
  dupBtn.addEventListener('click', () => { if (editMode) duplicateSelected(); });
  delBtn.addEventListener('click', () => { if (editMode) deleteSelected(); });

  function scheduleSave() {
    clearTimeout(saveTimer);
    statusEl.textContent='unsaved…';
    saveTimer=setTimeout(doSave,2000);
  }

  function doSave() {
    deselect();
    /* strip edit-mode inline styles temporarily before cloning */
    const cleanup=[];
    const strip = el => {
      ['cursor','pointerEvents','filter','outline','boxShadow'].forEach(prop => {
        const v=el.style[prop];
        if (v) { cleanup.push([el,prop,v]); el.style[prop]=''; }
      });
    };
    canvas.querySelectorAll('*').forEach(strip);
    strip(canvas);

    const clone=document.documentElement.cloneNode(true);
    clone.querySelectorAll('[data-drag-ui]').forEach(el=>el.remove());
    const html='<!DOCTYPE html>\n'+clone.outerHTML;

    /* restore live DOM */
    cleanup.forEach(([el,prop,val])=>el.style[prop]=val);

    if (window.parent&&window.parent!==window) {
      window.parent.postMessage({type:'wb-save-content',content:html},'*');
      statusEl.textContent='saved ✓';
      setTimeout(()=>{statusEl.textContent='';},3000);
    } else {
      /* standalone: download */
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
      a.download=(document.title||'chart')+'_edited.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      statusEl.textContent='downloaded ✓';
      setTimeout(()=>{statusEl.textContent='';},3000);
    }
  }
})();
</script>
