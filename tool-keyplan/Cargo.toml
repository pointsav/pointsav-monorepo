[package]
name = "tool-keyplan"
version = "0.0.1"
edition = "2021"
description = "BIM Key Plan compiler — TOML config → validated DTCG JSON"

[[bin]]
name = "tool-keyplan"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
anyhow = "1"
