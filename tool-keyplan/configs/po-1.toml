# tool-keyplan config — Private Office Small (PO-1)
#
# Authoritative area: FIN.xlsx Summary_Key Plans V3 2025-11-29 (325 SF / 30.19 m²)
# Zone depths: AEC Floor Plates Key Plans Notes.pdf
# Furniture program: CONSTRUCTION_2026_01_06_Key Plan_Professional Office_FFE_FIN.xlsx
#
# Coordinate system:
#   origin (0,0) = facade-left corner (top-left when viewed from above)
#   x   = along facade (right)
#   y   = depth into building (away from facade; +y toward Zone 2 / Zone 3)
#
# Positions are derived from zone geometry and methodology.
# Refinement from DISCOVERY_MCorp_Sketches_Key Plans_Private Office.pdf is pending.

[key_plan]
internal_code   = "PO-1"
display_name    = "Private Office — Small"
category        = "private-office"
capacity        = 1
zone1_depth_m   = 6.0
zone2_depth_m   = 3.8
zone3_depth_m   = 2.0
area_m2         = 30.19
area_sf         = 325

# Derived plan geometry:
#   total_depth_mm = (6.0 + 3.8 + 2.0) × 1000 = 11800
#   plan_width_mm  = 30.19 × 1e6 / 11800 ≈ 2558

[circulation]
standard                = "ASR A1.2"
min_area_per_person_m2  = 8.0
min_aisle_mm            = 875
wheelchair_radius_mm    = 750
desk_to_window_max_m    = 6.0

# ── Zone 1 (facade habitat, y = 0–6000 mm) ──────────────────────────────────

[[furniture]]
token        = "bim.interior.furniture.desk.steelcase-migration-se-58x29"
zone         = "Z1"
qty          = 1
x_mm         = 0.0
y_mm         = 0.0
rotation_deg = 0.0
note         = "Desk face at facade (y=0). Desktop 1473 × 737 mm; user works at y ≈ 737–1366 mm."

