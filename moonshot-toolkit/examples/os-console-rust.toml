# os-console seL4 Rust rootserver — Phase H2a milestone.
#
# Build from monorepo root:
#   CARGO_TARGET_DIR=/tmp/moonshot-h2a-build cargo run \
#     --manifest-path moonshot-toolkit/Cargo.toml \
#     -- build moonshot-toolkit/examples/os-console-rust.toml
#
# Boot with:
#   qemu-system-aarch64 -machine virt -cpu cortex-a53 -m 1G -display none \
#     -serial file:/tmp/sel4-serial.log -kernel build/system-image.bin \
#     && cat /tmp/sel4-serial.log
#
# Gate: "Hello from moonshot-sel4-vmm (Rust)" on QEMU serial.
# No C in the PD — pure Rust ABI wrappers via moonshot-sel4-vmm.

[[protection_domains]]
name        = "os-console"
binary      = "moonshot-sel4-vmm"
rust_bin    = "console_main"
priority    = 100
stack_bytes = 65536
