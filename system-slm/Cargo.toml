[package]
name = "system-slm"
version = "1.0.0"
edition = "2021"
authors = ["PointSav Digital Systems"]
description = "Semantic translation engine. Converts natural language to deterministic JSON."

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[workspace]
