  - type: prose
    body: |
      **Marcas comerciales.** Woodfine Capital Projects™, Woodfine Management Corp™, PointSav Digital Systems™, Totebox Orchestration™, Totebox Archive™ y Capability Geometry™ son marcas comerciales de Woodfine Capital Projects Inc., utilizadas en Canadá, los Estados Unidos, América Latina y Europa. Todas las demás marcas comerciales son propiedad de sus respectivos titulares.

      **Sin oferta de valores.** Nada de lo que se incluye en este sitio constituye una oferta de venta ni una solicitud de compra de participaciones de inversión en ninguna solución de tenencia directa de Woodfine. Cualquier oferta se realiza exclusivamente mediante el Memorándum de Colocación Privada correspondiente, que contiene información detallada sobre las condiciones y los riesgos de la inversión.

      **Solo inversores calificados.** El acceso a las soluciones de tenencia directa de Woodfine está restringido a Inversores Acreditados verificados conforme al Instrumento Nacional 45-106 — Exenciones de Prospecto y marcos equivalentes en las jurisdicciones aplicables, incluida la Regulación D de la Ley de Valores de EE. UU. de 1933, la Ley del Mercado de Valores de México y el Reglamento de Prospecto de la UE (UE 2017/1129).

      **Declaraciones prospectivas.** Este sitio contiene información prospectiva en el sentido de la legislación de valores aplicable, incluido el Instrumento Nacional 51-102 sobre Obligaciones de Divulgación Continua en Canadá y marcos regulatorios equivalentes a nivel mundial. Las declaraciones sobre el desarrollo, la integración y las capacidades operativas del modelo de soluciones de tenencia directa, la plataforma de PointSav Digital Systems y las soluciones de tenencia directa propuestas de Woodfine se basan en expectativas actuales y están sujetas a riesgos, incertidumbres e hipótesis conocidos y desconocidos. Los resultados reales pueden diferir materialmente. Woodfine renuncia a cualquier obligación de actualizar dichas declaraciones, salvo que lo exija la legislación de valores aplicable.

      **Registro.** Woodfine Capital Projects y sus filiales llevan a cabo actividades registrables, cuando corresponda, bajo las categorías pertinentes prescritas por la British Columbia Securities Commission y otros reguladores de valores canadienses. Los detalles de registro específicos están disponibles a petición.

