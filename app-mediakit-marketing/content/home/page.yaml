title: Home
slug: home
description: A real property developer with 40 years' experience in the procurement, development, and management of real property.
lang: en
sections:
  - type: hero
    headline: A real property developer with 40 years' experience
    subhead: >-
      The firm sponsors direct-hold solutions that hold four Development Classes
      of environmentally certified properties in or near Power Centres in
      selected North American and European markets.

  - type: card-grid
    columns: 4
    cards:
      - title: Alignment of Interests
        body: >-
          Our unique fee structure directly aligns the interests of investors
          and management. Woodfine's equity interest in each of our direct-hold
          solutions is held solely through the ownership of the units.
      - title: Freely Transferable
        body: >-
          Because our direct-hold solutions are regulated as public companies,
          their units are freely transferable and can be bought and sold at any
          time without the consent of Woodfine or other unit holders.
      - title: Low Fees
        body: >-
          Our partners pay one Advisory Fee — a single charge covering all
          aspects of the real estate businesses. It is calculated on the gross
          funded value, not Net Asset Value (NAV), keeping the manager's
          interest fully aligned with the partner's.
      - title: Anti-Dilution
        body: >-
          Our direct-hold solutions are closed-end with a fixed gross funded
          value, a feature that drives increasing yield over time, after an
          initial period. Increases in maximum subscribed capital are not
          permitted under the universal governing bylaws.
      - title: Reduced Volatility
        body: >-
          The Net Asset Value (NAV) of each direct-hold solution is not
          correlated to the stock market. Net Asset Values are posted quarterly
          and determined by third-party property appraisers.
      - title: No Bank Debt
        body: >-
          As reporting issuers, our direct-hold solutions may issue their own
          First Secured Mortgage Debentures in order to fund new buildings,
          rather than placing third-party bank debt on the properties.
      - title: Qualified Investments
        body: >-
          Prospective project sites and buildings must meet specific parameters
          before any project can be approved by an independent board of
          directors.
      - title: Digital Systems
        href: https://home.pointsav.com
        body: >-
          Woodfine partners with PointSav Digital Systems to deliver the digital
          infrastructure underpinning each project — BIM tokenization, location
          intelligence, and operational systems integrated across the
          direct-hold solution lifecycle.

  - type: card-grid
    columns: 3
    cards:
      - title: Manifest
        href: https://github.com/woodfine/woodfine-fleet-deployment
      - title: BIM Library
        href: https://bim.woodfinegroup.com/
      - title: Location Intelligence
        href: https://gis.woodfinegroup.com/

  - type: prose
    body: |
