[package]
name = "service-extraction"
version = "0.1.0"
edition = "2021"
description = "Universal Deterministic Asset Extractor for os-totebox"

[workspace]

[dependencies]
notify = "8.2.0"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
base64 = "0.22"
mailparse = "0.16.1"
lopdf = "0.34"
docx-rs = "0.4.20"
calamine = "0.34.0"
regex = "1.10"
html2text = "0.12" # NEW: Structural HTML Sanitizer
