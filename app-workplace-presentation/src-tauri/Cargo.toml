[package]
name = "workplace-presentation"
version = "0.1.0"
description = "Sovereign offline presentation tool — PointSav Digital Systems"
authors = ["PointSav Digital Systems"]
license = "EUPL-1.2"
repository = ""
edition = "2021"
rust-version = "1.70"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
# Tauri v1 — required for macOS 10.13 High Sierra compatibility.
tauri = { version = "1.7", features = [
  "dialog-open",
  "dialog-save",
  "fs-read-file",
  "fs-write-file",
  "fs-exists",
  "path-all",
  "shell-open"
] }
