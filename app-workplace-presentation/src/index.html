<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Workplace Presentation</title>
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>
  <div id="app-shell">
    <!-- Menubar -->
    <div id="menubar">
      <button class="menu-item">File</button>
      <button class="menu-item">Home</button>
      <button class="menu-item">Insert</button>
      <button class="menu-item">Design</button>
      <button class="menu-item">Slide Show</button>
      <button class="menu-item">View</button>
      <div class="menubar-spacer"></div>
    </div>

    <!-- Three-pane workspace -->
    <div id="workspace">
      <div id="slide-navigator">Slides</div>
      <div id="canvas-area">Canvas</div>
      <div id="code-view">Code</div>
    </div>

    <!-- Status bar -->
    <div id="statusbar">
      <span>Slide 1 of 1</span>
      <span class="statusbar-sep">·</span>
      <span>100%</span>
    </div>
  </div>
</body>
</html>
