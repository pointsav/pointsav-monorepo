[package]
name = "tool-proforma-engine"
version = "0.1.0"
edition = "2021"
description = "PCLP 1 proforma engine — 10-year LP financial model for Woodfine Capital Projects"
license = "EUPL-1.2"

[lib]
name = "proforma_engine"

[[bin]]
name = "tool-proforma-engine"
path = "src/main.rs"

[[bin]]
name = "discover"
path = "src/bin/discover.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
calamine = { version = "0.25", features = ["dates"] }
pulldown-cmark = { version = "0.12", default-features = false, features = ["html"] }
