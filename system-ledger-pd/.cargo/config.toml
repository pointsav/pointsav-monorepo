# Force the portable fiat-crypto backend for curve25519-dalek on the
# bare-metal x86_64 target. The SIMD backend selects AVX2 intrinsics that
# LLVM cannot lower for x86_64-unknown-none (no OS SIMD context save/restore).
[target.x86_64-unknown-none]
rustflags = ["--cfg", "curve25519_dalek_backend=\"fiat\""]
