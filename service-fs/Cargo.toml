[package]
name = "service-fs"
version = "1.0.1"
edition = "2021"
authors = ["PointSav Digital Systems"]
description = "Bare-Metal Unikernel File System Gatekeeper. Enforces WORM storage boundaries."

[[bin]]
name = "service-fs"
path = "src/main.rs"
# Excluded from test builds: #[panic_handler] conflicts with std test harness
test = false

[dev-dependencies]
tower = { version = "0.4", features = ["util"] }
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "ledger_bench"
harness = false
# Requires a lib target (posix_tile + ledger modules) not yet implemented.
# Enable with: cargo bench --features=bench-ledger
required-features = ["bench-ledger"]

[features]
# Gates the ledger criterion bench; disabled until PosixTileLedger lib target lands.
bench-ledger = []

[dependencies]
# Pure bare-metal enclave. Zero OS dependencies permitted.
