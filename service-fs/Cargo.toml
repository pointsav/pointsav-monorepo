[package]
name = "service-fs"
version = "1.0.1"
edition = "2021"
authors = ["PointSav Digital Systems"]
description = "WORM Storage Gatekeeper — Envelope A (std/axum HTTP). Envelope B (seL4 unikernel) is Phase 3."

[[bin]]
name = "service-fs"
path = "src/main.rs"

[dev-dependencies]
tower = { version = "0.4", features = ["util"] }
tempfile = "3"

[[bench]]
name = "ledger_bench"
harness = false
# Requires lib target (PosixTileLedger) not yet implemented.
# Enable with: cargo bench --features=bench-ledger
required-features = ["bench-ledger"]

[features]
bench-ledger = []

[dependencies]
axum = { version = "0.7", features = ["json"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
uuid = { version = "1", features = ["v4"] }
