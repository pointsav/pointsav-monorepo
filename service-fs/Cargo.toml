[package]
name = "service-fs"
version = "0.1.0"
edition = "2021"
authors = ["PointSav Digital Systems"]
description = "Ring 1 WORM Immutable Ledger — per-tenant boundary-ingest service exposing an MCP-server interface to sibling Ring 1 producers (service-people, service-email, service-input) and Ring 2 consumers (service-extraction)."

# Note: package version reset 1.0.1 → 0.1.0. The 1.0.1 stream
# belonged to the bare-metal seL4 unikernel scaffold relocated to
# vendor-sel4-fs/. This is a fresh hosted MCP-server skeleton with
# a different runtime model and an empty version stream.

[[bin]]
name = "service-fs"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net", "signal"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
sha2 = "0.10"
hex = "0.4"
ed25519-dalek = "2"
base64 = "0.22"
