[package]
edition = "2021"
rust-version = "1.81"
name = "tantivy"
version = "0.24.2"
authors = ["Paul Masurel <paul.masurel@gmail.com>"]
build = false
exclude = [
    "benches/*.json",
    "benches/*.txt",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
