# fail2ban filter for os-console SSH server
# Matches authentication failures logged by the russh-based SSH server.
# Deploy to: /etc/fail2ban/filter.d/os-console-ssh.conf

[Definition]
failregex = Authentication failed.*from <HOST>
            Invalid credentials.*from <HOST>
            ^.*sshd.*Failed password for .* from <HOST> port \d+

ignoreregex =
