[Service]
# Hardened 2026-06-02 after service-content hit the 4G cgroup ceiling under
# host memory pressure (GIS python3 process exhausted VM RAM outside foundry.slice).
# service-content was at available=0B and not responding to HTTP requests.
#
# MemoryMin=2G: the kernel must NOT reclaim below 2G from this cgroup even under
# host OOM pressure. This is the primary protection against rogue processes
# outside the slice starving the DataGraph.
#
# MemoryHigh raised 3800M→5500M: LadybugDB at 7,445+ entities was already touching
# the old ceiling; the throttle events were silently degrading performance.
#
# MemoryMax raised 4G→6G: hard ceiling with 500M headroom above the new MemoryHigh.
#
# MemorySwapMax=0: never swap service-content. A graph that's partially on disk
# is useless for real-time context injection.
#
# Install: sudo cp this file /etc/systemd/system/local-content.service.d/memory.conf
#          sudo systemctl daemon-reload && sudo systemctl restart local-content.service
MemoryMin=2G
MemoryHigh=5500M
MemoryMax=6G
MemorySwapMax=0
OOMPolicy=stop
