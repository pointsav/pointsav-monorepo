[Service]
# OOM protection for the DataGraph — added 2026-06-02.
#
# OOMScoreAdjust=-200: moderately protected from the OOM killer.
# Hierarchy rationale:
#   local-doorman:  -300 (most protected — routing boundary)
#   local-content:  -200 (graph is long-loading; losing it requires minutes to rebuild)
#   local-slm:      +500 (llama-server is stateless/restartable — acceptable kill candidate)
#
# Without this adjustment, service-content competed equally with research/GIS
# python processes on the host and could be killed while a 2.9G rogue process survived.
#
# Slice=foundry-services.slice ensures the MemoryMin reservation in the slice
# is applied to this service. All foundry services must be in this slice for the
# slice-level MemoryMin to be effective.
#
# Install: sudo cp this file /etc/systemd/system/local-content.service.d/oom.conf
#          sudo systemctl daemon-reload && sudo systemctl restart local-content.service
OOMScoreAdjust=-200
Slice=foundry-services.slice
