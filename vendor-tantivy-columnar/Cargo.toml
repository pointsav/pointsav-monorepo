[package]
name = "tantivy-columnar"
version = "0.5.0"
edition = "2021"
license = "MIT"
homepage = "https://github.com/quickwit-oss/tantivy"
repository = "https://github.com/quickwit-oss/tantivy"
description = "column oriented storage for tantivy (local patch — E0119 fix)"
categories = ["database-implementations", "data-structures", "compression"]

[dependencies]
itertools = "0.14.0"
fastdivide = "0.4.0"
stacker = { version = "0.5", package = "tantivy-stacker" }
sstable = { version = "0.5", package = "tantivy-sstable" }
common = { version = "0.9", package = "tantivy-common" }
tantivy-bitpacker = { version = "0.8" }
serde = "1.0.152"
downcast-rs = "2.0.1"

[dev-dependencies]
proptest = "1"
more-asserts = "0.3.1"
rand = "0.8"
binggan = "0.14.0"

[[bench]]
name = "bench_merge"
harness = false

[[bench]]
name = "bench_access"
harness = false

[features]
unstable = []
