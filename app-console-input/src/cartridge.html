<div style="display: flex; width: 100%; height: 100%;">
    <div style="flex: 1; border-right: 1px solid var(--wf-border-heavy); display: flex; flex-direction: column; background: var(--wf-card);">
        <div style="padding: 16px 24px; border-bottom: 1px solid var(--wf-border-heavy); font-weight: bold; font-size: 14px;">[F12] THE ANCHOR (INGRESS)</div>
        <div id="f12-dropzone" style="flex: 1; margin: 24px; border: 2px dashed var(--wf-muted); display: flex; align-items: center; justify-content: center; background: var(--wf-canvas); cursor: crosshair;">
            <div style="text-align: center; pointer-events: none;">
                <div style="font-size: 32px; margin-bottom: 12px; opacity: 0.8;" id="f12-icon">📥</div>
                <div id="f12-title" style="font-weight: bold; color: var(--wf-accent); font-size: 14px; letter-spacing: 1px;">DROP BASE ASSET HERE</div>
                <div style="font-size: 11px; color: var(--wf-muted); margin-top: 12px;">.PDF, .CSV, .EML, .DOCX</div>
            </div>
        </div>
    </div>
    <div style="flex: 1; background: var(--wf-canvas); padding: 32px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto;">
        <div style="font-size: 12px; font-weight: bold; color: var(--wf-accent); border-bottom: 1px solid var(--wf-muted); padding-bottom: 8px;">FIDUCIARY ROUTING MATRIX</div>
        
        <div>
            <label style="display: block; font-size: 11px; font-weight: bold; margin-bottom: 8px;">Corporate Entity (Jurisdiction):</label>
            <select style="width: 100%; padding: 10px; font-family: var(--font-mono); border: 1px solid var(--wf-border-heavy); background: #fff;">
                <option>WCP-CA-01 (Professional Centres Canada LP)</option>
                <option>WCP-US-02 (Professional Centres US LP)</option>
                <option>WCP-MX-04 (Professional Centres Mexico FIBRA)</option>
            </select>
        </div>

        <div>
            <label style="display: block; font-size: 11px; font-weight: bold; margin-bottom: 8px;">Chart of Accounts:</label>
            <select style="width: 100%; padding: 10px; font-family: var(--font-mono); border: 1px solid var(--wf-border-heavy); background: #fff;">
                <option>[01] Compliance - Counsel</option>
                <option>[05] Real Estate - Leasing</option>
                <option>[11] Investor Relations - Finance</option>
            </select>
        </div>

        <div style="margin-top: auto; padding: 16px; border: 1px dashed var(--wf-alert); font-size: 11px; color: var(--wf-muted); text-align: center;">
            <strong>WORM COMPLIANCE ACTIVE</strong><br>
            Dropped assets are sent directly to service-fs via API.<br>Execution permissions stripped immediately.
        </div>
    </div>
</div>
<script>
    (function() {
        const dropzone = document.getElementById('f12-dropzone');
        const title = document.getElementById('f12-title');
        const icon = document.getElementById('f12-icon');

        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.borderColor = 'var(--wf-accent)'; title.textContent = 'INITIATE COMMIT SEQUENCE'; });
        dropzone.addEventListener('dragleave', (e) => { e.preventDefault(); dropzone.style.borderColor = 'var(--wf-muted)'; title.textContent = 'DROP BASE ASSET HERE'; });
        dropzone.addEventListener('drop', async (e) => {
            e.preventDefault(); dropzone.style.borderColor = 'var(--wf-muted)';
            if (e.dataTransfer.files.length === 0) return;
            const file = e.dataTransfer.files[0];
            title.textContent = `TRANSMITTING TO SERVICE-FS...`; icon.textContent = '📡';
            try {
                const response = await fetch('/api/upload', { method: 'POST', headers: { 'x-file-name': file.name }, body: file });
                if (response.ok) {
                    title.textContent = `[SUCCESS] ASSET VAULTED`; title.style.color = '#54924E'; icon.textContent = '🔒';
                    setTimeout(() => { title.textContent = 'DROP BASE ASSET HERE'; title.style.color = 'var(--wf-accent)'; icon.textContent = '📥'; }, 3000);
                }
            } catch (err) { title.textContent = `[FAULT] KERNEL REJECTION`; title.style.color = 'var(--wf-alert)'; icon.textContent = '🛑'; }
        });
    })();
</script>
