# legal-tokens-pointsav.yaml
# Canonical legal text tokens — PointSav brand
# Destination: factory-release-engineering/tokens/legal-tokens-pointsav.yaml
# Consumed by: app-mediakit-knowledge shell_chrome() on documentation.pointsav.com,
#   pointsav.com HTML templates, CI footer validation
#
# Source authority: factory-release-engineering/TRADEMARK.md,
#   policies/DISCLAIMER.md
#
# Note: PointSav Digital Systems is a trade name of Woodfine Capital Projects Inc.
# All marks and copyright belong to Woodfine Capital Projects Inc.
#
# Drafted by: project-editorial 2026-05-24
# Routing: Command Session → factory-release-engineering (admin-tier)

schema: foundry-legal-tokens-v1
brand: pointsav
brand_surface: pointsav.com
owner: "Woodfine Capital Projects Inc."
trade_name: "PointSav Digital Systems"
effective: 2026-01-01

copyright:
  holder: "Woodfine Capital Projects Inc."
  trade_name: "PointSav Digital Systems"
  year_current: 2026
  statement: "© {year_current} {holder}. All rights reserved."

trademarks:
  # PointSav-surface mark order — lead with PointSav marks
  owned:
    - "PointSav Digital Systems™"
    - "Totebox Orchestration™"
    - "Totebox Archive™"
    - "Woodfine Capital Projects™"
    - "Woodfine Management Corp™"
  jurisdictions:
    - Canada
    - United States
    - Latin America
    - Europe
  statement: >
    PointSav Digital Systems™, Totebox Orchestration™, and Totebox Archive™ are
    trademarks of Woodfine Capital Projects Inc., used in Canada, the United States,
    Latin America, and Europe. All other trademarks are the property of their respective
    owners.

footer:
  # Standard footer — all PointSav-brand properties
  standard: |
    © {copyright.year_current} {copyright.holder}. All rights reserved.
    {trademarks.statement}

contact:
  open_source: "open.source@pointsav.com"
  trademark: "corporate.secretary@woodfinegroup.com"
  legal: "legal@woodfinegroup.com"

disclaimers:
  no_investment_advice: >
    PointSav Digital Systems software and documentation are provided for operational,
    research, and development purposes. Nothing on PointSav properties constitutes
    investment advice or a solicitation to invest in any Woodfine Capital Projects
    partnership or direct-hold solution.
  # PointSav-brand properties do not carry investment disclaimers.
  # For pages that cross the investment/technology boundary, use legal-tokens-woodfine.yaml
  # and apply the footer.investment template.

# ── Update procedure ──────────────────────────────────────────────────────────
# copyright.year_current     — update at the start of each calendar year
# trademarks.owned / statement — update when marks are registered, abandoned, or renamed
# contact.*                  — update when organisational contacts change
# After any update: run CI footer-validation check to confirm cascade.
