[package]
name = "service-input"
version = "0.1.0"
edition = "2021"
authors = ["PointSav Digital Systems"]
description = "Input Machine backend — file ingest, batch migration, and calibration evaluation for jennifer-2."

[[bin]]
name = "service-input"
path = "src/main.rs"

[dependencies]
axum = { version = "0.7", features = ["json"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sha2 = "0.10"
hex = "0.4"
walkdir = "2"
csv = "1.3"
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"

[dev-dependencies]
tempfile = "3"
