[package]
name = "service-input"
version = "0.1.0"
edition = "2021"
authors = ["PointSav Digital Systems"]
description = "Ring 1 generic document ingest — pluggable parser dispatcher (PDF / DOCX / XLSX / Markdown per SLM-STACK §3.4) writing parsed payloads through service-fs's WORM ledger."

[lib]
name = "service_input"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
oxidize-pdf = "2"

[dev-dependencies]
# Future parser crates land here as parsers are wired
# (docx-rust, calamine, pulldown-cmark per SLM-STACK §3.4).
