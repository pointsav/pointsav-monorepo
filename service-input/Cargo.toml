[package]
name = "service-input"
version = "0.1.0"
edition = "2021"
authors = ["PointSav Digital Systems"]
description = "Ring 1 generic document ingest — pluggable parser dispatcher (PDF / DOCX / XLSX / Markdown per SLM-STACK §3.4) writing parsed payloads through service-fs's WORM ledger."

[lib]
name = "service_input"
path = "src/lib.rs"

[[bin]]
name = "service-input"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
oxidize-pdf = "2"
pulldown-cmark = "0.12"
docx-rust = "0.1.11"
calamine = "0.34.0"
ureq = { version = "3.3.0", default-features = false, features = ["json"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net"] }
axum = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
base64 = "0.22"

[dev-dependencies]
service-fs = { path = "../service-fs" }
tower = { version = "0.4", features = ["util"] }
