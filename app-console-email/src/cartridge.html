<div style="width: 100%; height: 100%; display: flex; flex-direction: column; gap: 20px; color: var(--wf-slate); text-transform: none; letter-spacing: normal;">
    <div style="flex-shrink: 0; border-bottom: 2px solid var(--wf-slate); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-end;">
        <h2 style="margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px;">THE COLD ARCHIVE (BASE ASSETS)</h2>
        <button style="padding: 6px 12px; background: var(--wf-accent); color: #fff; border: none; font-family: var(--font-mono); font-size: 11px; font-weight: bold; cursor: pointer;">[ EXPORT INDEX CARDS (.CSV) ]</button>
    </div>

    <div style="display: flex; gap: 16px;">
        <input type="text" placeholder="Omnibar Context: Search Immutable Vault (e.g., 'Find invoice from John')..." style="flex: 1; padding: 12px; font-family: var(--font-mono); border: 1px solid var(--wf-muted); background: #fff;" disabled>
    </div>

    <table style="width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
        <tr style="background: var(--wf-slate); color: #fff; text-align: left;">
            <th style="padding: 12px;">TIMESTAMP</th>
            <th style="padding: 12px;">FROM / TO</th>
            <th style="padding: 12px;">SUBJECT</th>
            <th style="padding: 12px;">CHART OF ACCOUNTS</th>
        </tr>
        <tr style="border-bottom: 1px solid var(--wf-border);">
            <td style="padding: 12px; font-family: var(--font-mono); color: var(--wf-muted);">2026-03-27 14:30</td>
            <td style="padding: 12px; font-weight: bold;">Michael O'Boyle</td>
            <td style="padding: 12px;">RE: Bloomberg Mexico Syndication</td>
            <td style="padding: 12px; font-family: var(--font-mono); color: var(--wf-accent);">[11] Investor Relations</td>
        </tr>
        <tr style="border-bottom: 1px solid var(--wf-border); background: var(--wf-canvas);">
            <td style="padding: 12px; font-family: var(--font-mono); color: var(--wf-muted);">2026-03-26 09:15</td>
            <td style="padding: 12px; font-weight: bold;">Peter Woodfine</td>
            <td style="padding: 12px;">Architectural Drawings - Site B</td>
            <td style="padding: 12px; font-family: var(--font-mono); color: var(--wf-accent);">[09] Construction</td>
        </tr>
    </table>
</div>
