# /etc/local-knowledge/projects.toml
# Knowledge platform — Woodfine Projects instance
# Template: copy to /etc/local-knowledge/projects.toml on target host
# Operator: update paths to match actual content-repo checkout location
#
# Blueprint set: TOPIC only (no GUIDEs on projects or corporate instances)
# Brand: woodfine (loads tokens-woodfine.css after tokens.css)
# Port: 9093 (local; nginx reverse-proxies to projects.woodfinegroup.com)

[site]
title     = "Woodfine Projects"
brand     = "woodfine"
bind      = "127.0.0.1:9093"
state_dir = "/var/lib/local-knowledge/state-projects"

[[mount]]
path          = "/srv/foundry/clones/project-knowledge/media-knowledge-projects"
role          = "primary"
blueprint_set = ["TOPIC"]

[citations]
path = "/srv/foundry/citations.yaml"
