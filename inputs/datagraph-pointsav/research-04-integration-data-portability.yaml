category: "04 Integration & Data Portability"
sources:
  - url: "https://eur-lex.europa.eu/eli/reg/2023/2854/oj/eng"
    title: "Regulation (EU) 2023/2854 (Data Act) — harmonised rules on fair access to and use of data"
    relevance: "The Data Act mandates that data-processing services let customers switch providers and port data in machine-readable formats with barriers and egress fees removed — the regulatory backbone for PointSav's 'Freely Transferable' archive claim."
    slide_context: "Economic Model — Freely Transferable Archives; Data Portability Reference"
    published: "2023"
    source_type: "regulatory"

  - url: "https://gdpr-info.eu/art-20-gdpr/"
    title: "Art. 20 GDPR — Right to data portability"
    relevance: "Establishes the legal definition of portability as a 'structured, commonly used and machine-readable format', directly validating PointSav's WORM flat-file export model over proprietary database lock-in."
    slide_context: "Economic Model — Freely Transferable Archives; Data Portability Reference"
    published: "2016"
    source_type: "regulatory"

  - url: "https://www.sec.gov/investment/amendments-electronic-recordkeeping-requirements-broker-dealers"
    title: "SEC Amendments to Electronic Recordkeeping Requirements for Broker-Dealers (Rule 17a-4)"
    relevance: "Defines the non-rewriteable, non-erasable WORM standard for regulated financial records, anchoring ToteboxOS WORM flat-file archives in a compliance regime the pension-fund/asset-manager audience already recognizes."
    slide_context: "Totebox Archives (WORM flat-file); Communications Services — Maildir Flat-File"
    published: "2022"
    source_type: "regulatory"

  - url: "https://nvlpubs.nist.gov/nistpubs/specialpublications/NIST.SP.800-207.pdf"
    title: "NIST SP 800-207 — Zero Trust Architecture"
    relevance: "Frames authorization around Policy Decision/Enforcement Points evaluated per-resource rather than a perimeter or credential DB — the standards lineage for PointSav's 'network topology IS the permission system' machine-based authorization."
    slide_context: "Auth-as-Permissions (Authentication as Permissions); MBA machine-based authorization"
    published: "2020"
    source_type: "standards"

  - url: "https://csrc.nist.gov/pubs/sp/800/63/b/4/final"
    title: "NIST SP 800-63B-4 — Digital Identity Guidelines: Authentication and Authenticator Management"
    relevance: "Current (July 2025) federal authentication baseline; PointSav can position machine-based authorization with no credential database as a structural alternative to the authenticator-management burden this standard codifies."
    slide_context: "Auth-as-Permissions; F-Keys Console (F12 human checkpoint)"
    published: "2025"
    source_type: "standards"

  - url: "https://www.iso.org/standard/80194.html"
    title: "ISO/IEC 27040:2024 — Information technology — Storage security"
    relevance: "International storage-security standard that explicitly recommends WORM storage to meet data-immutability requirements, giving developers and auditors a vendor-neutral citation for the ToteboxOS archive design."
    slide_context: "Totebox Archives (WORM flat-file); First Secured Debentures / ongoing reporting integrity"
    published: "2024"
    source_type: "standards"

  - url: "https://solidproject.org/TR/protocol"
    title: "Solid Protocol — W3C Solid Community Group technical report (Capadisli, Berners-Lee, Verborgh, Kjernsmo)"
    relevance: "The canonical decentralized personal-data-store specification: user-owned pods with provider migration and app/data separation — the closest standards precedent for PointSav's freely transferable, application-independent archives."
    slide_context: "Data Portability Reference — Solid / Pods Precedent; Freely Transferable Archives"
    published: "2022"
    source_type: "standards"

  - url: "https://link.springer.com/article/10.1007/s10257-024-00692-0"
    title: "Assessing the value of decentralized and interoperable data storage for service providers (Information Systems and e-Business Management)"
    relevance: "Peer-reviewed economic analysis of decentralized/interoperable storage (Solid-style) for service providers, supplying academic grounding for PointSav's economic model and decentralized-orchestration thesis."
    slide_context: "Economic Model — Decentralized Orchestration; Data Portability Reference — Solid / Pods Precedent"
    published: "2024"
    source_type: "academic"

  - url: "https://www.gartner.com/en/documents/3976113"
    title: "A Guidance Framework for Managing Vendor Lock-In Risks in Cloud IaaS (Gartner)"
    relevance: "Analyst framework quantifying lock-in risk and exit readiness (open portable formats, migration runbooks), the market-pain narrative that PointSav's freely transferable archives are designed to eliminate."
    slide_context: "Economic Model — Decentralized Orchestration; Freely Transferable Archives"
    published: "2020"
    source_type: "analyst_report"

  - url: "https://en.wikipedia.org/wiki/Maildir"
    title: "Maildir — flat-file mail storage format (D. J. Bernstein, qmail)"
    relevance: "Documents the lock-free, one-file-per-message flat-file mail format usable over networked filesystems — the direct technical precedent for PointSav's Maildir-based communications services (email/chat/calendar/conferencing)."
    slide_context: "Communications Services — Maildir Flat-File"
    published: "2024"
    source_type: "vendor"

  - url: "https://doc.dovecot.org/2.4.0/core/config/mailbox/formats/maildir.html"
    title: "Maildir Mailbox Format — Dovecot documentation"
    relevance: "Enterprise IMAP-server reference documentation for the Maildir format's tmp/new/cur structure, giving developers an authoritative implementation citation for the flat-file communications surface."
    slide_context: "Communications Services — Maildir Flat-File; F-Keys Console — Search (structured document query)"
    published: "2024"
    source_type: "vendor"

  - url: "https://finance.ec.europa.eu/publications/financial-data-access-and-payments-package_en"
    title: "European Commission — Financial Data Access (FiDA) and Payments Package proposal"
    relevance: "EU open-finance proposal requiring customers to 'take their data with them' across pensions, investments and insurance — connects PointSav's portability story directly to the pension-fund/asset-manager investor audience and Woodfine LP reporting."
    slide_context: "Freely Transferable Standard data; Woodfine LPs / ongoing reporting requirements; narrow banking"
    published: "2023"
    source_type: "regulatory"
