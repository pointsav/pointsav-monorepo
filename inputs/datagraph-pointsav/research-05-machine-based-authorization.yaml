category: "05 Machine-Based Authorization"
sources:
  - url: "https://nvlpubs.nist.gov/nistpubs/specialpublications/NIST.SP.800-207.pdf"
    title: "NIST Special Publication 800-207: Zero Trust Architecture"
    relevance: "Establishes the federal standard that no implicit trust is granted by network location alone — the conceptual backbone PointSav extends by making network topology itself the permission system."
    slide_context: "Machine Based Authorization (section divider / MBA); Distributed Private Network; Pairing As Permissions"
    published: "2020"
    source_type: "standards"

  - url: "https://pages.nist.gov/800-63-4/sp800-63b/authenticators/"
    title: "NIST SP 800-63B-4: Digital Identity Guidelines — Authentication and Authenticator Management (Revision 4)"
    relevance: "Defines AAL3 as requiring proof of possession of a hardware cryptographic key via a protocol — the assurance tier that credential-less, key-bound machine authorization meets without a password database."
    slide_context: "Machine Based Authorization; Registry Token; no credential DB rationale"
    published: "2025"
    source_type: "standards"

  - url: "https://nvlpubs.nist.gov/nistpubs/specialpublications/nist.sp.800-63b.pdf"
    title: "NIST SP 800-63B: Digital Identity Guidelines — Authentication and Lifecycle Management (Revision 3)"
    relevance: "Section 4.3 mandates hardware cryptographic modules (FIPS 140 Level 2+, physical security Level 3+) for AAL3, anchoring the claim that machine-bound keys outperform shared-secret credential stores."
    slide_context: "Machine Based Authorization; Registry Token — Access Record; no raw data / no credential DB"
    published: "2017"
    source_type: "standards"

  - url: "https://www.sec.gov/investment/amendments-electronic-recordkeeping-requirements-broker-dealers"
    title: "SEC Final Rule: Amendments to Electronic Recordkeeping Requirements for Broker-Dealers (Rule 17a-4)"
    relevance: "The 2022 amendment governs WORM and audit-trail recordkeeping plus immutable access logging — directly mapping to PointSav access records and the regulated-investor side of the pitch."
    slide_context: "Access Records; Registry Token — Access Record (planned slide)"
    published: "2022"
    source_type: "regulatory"

  - url: "https://digital-strategy.ec.europa.eu/en/policies/data-act"
    title: "Data Act (Regulation (EU) 2023/2854) — Shaping Europe's Digital Future"
    relevance: "Mandates data portability, cloud switching rights, and removal of vendor lock-in barriers — the regulatory driver for a customer-owned, not-a-cloud architecture across on-prem / leased / Google Cloud / AWS."
    slide_context: "Not a Cloud; on-prem / leased / Google Cloud / AWS; Distributed Private Network"
    published: "2023"
    source_type: "regulatory"

  - url: "https://www.wireguard.com/papers/wireguard.pdf"
    title: "WireGuard: Next Generation Kernel Network Tunnel (Jason A. Donenfeld, NDSS 2017)"
    relevance: "Formalizes cryptokey routing — an association between a peer public key and its allowed tunnel IPs — the exact primitive behind 'network topology IS the permission system' and Pairing As Permissions."
    slide_context: "Pairing As Permissions; IP Address; Machine Based Authorization; Distributed Private Network"
    published: "2017"
    source_type: "academic"

  - url: "https://www.wireguard.com/papers/dowling-paterson-computational-2018.pdf"
    title: "A Cryptographic Analysis of the WireGuard Protocol (Dowling & Paterson)"
    relevance: "Provides the formal security proof for WireGuard's mutual public-key authentication, giving investor- and developer-grade rigor to the credential-less pairing model."
    slide_context: "Machine Based Authorization; Pairing As Permissions; no credential DB"
    published: "2018"
    source_type: "academic"

  - url: "https://www.rfc-editor.org/info/rfc8446/"
    title: "RFC 8446: The Transport Layer Security (TLS) Protocol Version 1.3"
    relevance: "Defines certificate-based mutual authentication where each endpoint proves possession of a key — the IETF standard underpinning machine-to-machine pairing without a central password store."
    slide_context: "Machine Based Authorization; Registry Token; Pairing As Permissions"
    published: "2018"
    source_type: "standards"

  - url: "https://www.ietf.org/rfc/rfc8705.html"
    title: "RFC 8705: OAuth 2.0 Mutual-TLS Client Authentication and Certificate-Bound Access Tokens"
    relevance: "Specifies binding access tokens to a client's TLS certificate so a token is useless without the originating machine — the standards basis for a Registry Token tied to a specific node."
    slide_context: "Registry Token — Access Record + Pairing As Permissions (planned slide)"
    published: "2020"
    source_type: "standards"

  - url: "https://csrc.nist.gov/pubs/sp/800/204/b/final"
    title: "NIST SP 800-204B: Attribute-based Access Control for Microservices-based Applications using a Service Mesh"
    relevance: "Documents per-service identity and mTLS as the de facto authorization mechanism between machines, validating stateless multi-archive aggregation without a shared credential database."
    slide_context: "Distributed Private Network; Interface OS / Console OS; stateless aggregation (OrchestrationOS)"
    published: "2021"
    source_type: "standards"

  - url: "https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-204A.pdf"
    title: "NIST SP 800-204A: Building Secure Microservices-based Applications Using Service-Mesh Architecture"
    relevance: "States that every pair of communicating entities must hold distinct identities and mutually authenticate — the architectural justification for pairing-based permissions over a central auth server."
    slide_context: "Pairing As Permissions; Network Admin OS; InfrastructureOS"
    published: "2020"
    source_type: "standards"

  - url: "https://tag-security.cncf.io/community/assessments/projects/spiffe-spire/self-assessment/"
    title: "SPIFFE/SPIRE Security Self-Assessment (CNCF Graduated Project)"
    relevance: "Demonstrates attested, platform-derived workload identity that replaces shared secrets — a production precedent for deriving authorization from what a machine is and where it runs, not a stored credential."
    slide_context: "Machine Based Authorization; no credential DB; Registry Token"
    published: "2022"
    source_type: "standards"

  - url: "https://www.cisa.gov/sites/default/files/2023-04/zero_trust_maturity_model_v2_508.pdf"
    title: "CISA Zero Trust Maturity Model, Version 2.0"
    relevance: "Defines the Identity and Networks pillars and the 'optimal' stage where access is continuously enforced at the network layer — positioning topology-as-permission as the mature endpoint of zero trust."
    slide_context: "Machine Based Authorization (section divider); Network Admin OS; Distributed Private Network"
    published: "2023"
    source_type: "regulatory"

  - url: "https://www.gartner.com/en/documents/4632099"
    title: "Gartner Market Guide for Zero Trust Network Access (ZTNA)"
    relevance: "Analyst forecast that ZTNA — identity-and-context logical access boundaries — replaces VPNs for most new remote access by 2025, framing the market shift PointSav's pairing model addresses for investor audiences."
    slide_context: "Distributed Private Network; Not a Cloud; Machine Based Authorization"
    published: "2023"
    source_type: "analyst_report"
