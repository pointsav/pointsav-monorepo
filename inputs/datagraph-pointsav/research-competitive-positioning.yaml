sources:
  # ---- (1) W3C Solid Protocol vs data portability architectures ----
  - url: "https://solidproject.org/TR/protocol"
    title: "Solid Protocol"
    year: "2022"
    publisher: "Solid Community Group (W3C)"
    relevance: "Authoritative technical report defining Pods (personal data stores) built on HTTP, RDF, WebID, Linked Data Platform (LDP), and Web Access Control (WAC). This is the canonical reference for any PointSav slide positioning Solid-style user-owned data against centralized SaaS lock-in, and grounds the Solid / Pods slide in the actual spec rather than marketing summary."
    slide_context: "Solid / Pods; Private Network; Pairing as Permissions"
    key_stat: "The Solid Protocol is a Solid Community Group report published 2022 — explicitly NOT a W3C Standard nor on the W3C Standards Track; it composes WebID, LDP, and Web Access Control over HTTP/RDF."

  - url: "https://solid.github.io/solid-wg-charter/charter/"
    title: "Linked Web Storage Working Group Charter"
    year: "2024"
    publisher: "W3C"
    relevance: "The chartered W3C Working Group that is standardizing Solid-derived storage and interoperability, signalling the maturation of decentralized personal-data-store architecture from a community group toward a formal standard. Supports PointSav's structural positioning that user-controlled storage with portable access control is an emerging open standard, not a proprietary novelty."
    slide_context: "Solid / Pods; Private Network; Owner / Operator"
    key_stat: "W3C chartered the Linked Web Storage Working Group (2024) to standardize a protocol for decentralized read/write of resources with access control, advancing Solid concepts onto the W3C Standards Track."

  - url: "https://eur-lex.europa.eu/eli/reg/2016/679/oj"
    title: "Regulation (EU) 2016/679 (GDPR), Article 20 — Right to data portability"
    year: "2016"
    publisher: "European Union (EUR-Lex)"
    relevance: "The legal baseline for data portability: individuals may receive personal data in a structured, commonly used, machine-readable format and transmit it to another controller without hindrance. PointSav's user-owned-data architecture maps directly onto this statutory right, letting the design slides frame portability as regulatory alignment, not merely a feature."
    slide_context: "Solid / Pods; Economic Model; Owner / Operator"
    key_stat: "GDPR Art. 20 grants the right to receive personal data in a 'structured, commonly used and machine-readable format' and transmit it to another controller without hindrance (in force since 25 May 2018)."

  - url: "https://eur-lex.europa.eu/eli/reg/2023/2854/oj"
    title: "Regulation (EU) 2023/2854 (Data Act)"
    year: "2023"
    publisher: "European Union (EUR-Lex)"
    relevance: "Extends portability beyond GDPR to non-personal and IoT-generated data and forces cloud/SaaS providers to enable switching and remove egress fees. This is the strongest external pressure validating an architecture (like PointSav's) that avoids vendor lock-in and supports open, standardized interfaces — directly relevant to deployment-tier and economic-model framing."
    slide_context: "Deployment Tiers Matrix; Public Cloud; Economic Model; IoT Data"
    key_stat: "The EU Data Act applies from 12 September 2025 and mandates that cloud/SaaS providers eliminate data-switching charges by 12 January 2027, requiring open, standardized interfaces and formats."

  # ---- (2) seL4 vs other verified OS projects ----
  - url: "https://dl.acm.org/doi/10.1145/2560537"
    title: "Comprehensive Formal Verification of an OS Microkernel"
    year: "2014"
    publisher: "ACM Transactions on Computer Systems (Klein et al.)"
    relevance: "The definitive peer-reviewed account of seL4's machine-checked proof from abstract spec down to C implementation — the foundation of every claim that seL4 is the only general-purpose OS kernel with full functional-correctness verification. Anchors the seL4 Kernel and Three-Layer Stack slides in primary academic literature."
    slide_context: "seL4 Kernel; Three-Layer Stack; OS Matrix; Interface OS"
    key_stat: "seL4 is ~8,700 lines of C and ~600 lines of assembler, formally verified in Isabelle/HOL — the first proof of functional correctness of a complete, general-purpose OS kernel (ACM TOCS Vol. 32, No. 1, Feb 2014)."

  - url: "https://sel4.systems/About/seL4-whitepaper.pdf"
    title: "The seL4 Microkernel — An Introduction (seL4 Whitepaper)"
    year: "2020"
    publisher: "seL4 Foundation"
    relevance: "Official Foundation whitepaper stating verification scope, performance, and capability-security model, and comparing seL4 to its L4 lineage. Provides vendor-authoritative quotable figures (IPC overhead, TCB size, proof properties) for the seL4 Kernel and OS Matrix slides without relying on Wikipedia."
    slide_context: "seL4 Kernel; OS Matrix; Three-Layer Stack; Authentication"
    key_stat: "seL4 is the world's most highly assured OS, with machine-checked proofs of functional correctness plus integrity and confidentiality enforcement; IPC runs within ~10-20% of the hardware limit of kernel entry/exit."

  - url: "https://genode.org/documentation/genode-foundations-25-05.pdf"
    title: "Genode OS Framework Foundations (25.05)"
    year: "2025"
    publisher: "Genode Labs (Norman Feske)"
    relevance: "Primary documentation for Genode, the leading component OS framework that runs atop multiple L4-family kernels including seL4, Fiasco.OC, and NOVA. Establishes the comparative landscape — Genode and Sculpt OS sit above seL4 — letting PointSav position its stack against alternative verified/microkernel OS architectures with accurate kernel-portability facts."
    slide_context: "OS Matrix; seL4 Kernel; Three-Layer Stack; Interface OS"
    key_stat: "Genode runs on most members of the L4 family — NOVA, seL4, Fiasco.OC, OKL4 v2.1, L4ka::Pistachio, L4/Fiasco — though seL4 support is documented as experimental."

  - url: "https://sel4.org/Summit/2025/slides/sculpt-os.pdf"
    title: "Sculpt OS — a dynamic general-purpose OS powered by Genode on seL4"
    year: "2025"
    publisher: "Genode Labs / seL4 Summit"
    relevance: "Demonstrates that a usable general-purpose desktop OS (Sculpt) now runs on the verified seL4 kernel via Genode, the strongest counter to the 'verified kernels are research toys' objection. Directly supports PointSav slides arguing a verified microkernel can host a real interface OS and console environment."
    slide_context: "Interface OS; seL4 Kernel; Three-Layer Stack; OS Matrix; Command Center"
    key_stat: "Sculpt OS is a dynamic, general-purpose operating system powered by Genode running on the formally verified seL4 microkernel (seL4 Summit 2025)."

  # ---- (4) verified OS adoption in regulated industries ----
  - url: "https://www.helpnetsecurity.com/2020/04/08/sel4-foundation/"
    title: "seL4 creates open source foundation to enable more secure computing systems"
    year: "2020"
    publisher: "Help Net Security"
    relevance: "Documents the formation of the seL4 Foundation under the Linux Foundation with industry founding members across defense, automotive, and embedded sectors — evidence that verified-OS adoption is institutional, not academic. Supports PointSav governance/foundation framing and the case that open + verified can carry an industry consortium."
    slide_context: "Repositories; Licensing Model; seL4 Kernel; Owner / Operator"
    key_stat: "The seL4 Foundation launched in April 2020 under the Linux Foundation with founding members including CSIRO's Data61, UNSW Sydney, HENSOLDT Cyber, Ghost Locomotion, Cog Systems, and DornerWorks."

  - url: "https://www.dornerworks.com/blog/sel4-medical-products/"
    title: "Enable the Security Potential and Versatility of seL4 in Medical Device Development"
    year: "2021"
    publisher: "DornerWorks"
    relevance: "An engineering-vendor analysis of applying seL4 to regulated medical-device development, naming the relevant assurance schemes (Common Criteria, ISO 26262, DO-178C) and how seL4's proofs exceed them. Gives PointSav concrete regulated-industry adoption context for slides on verified-OS suitability in aviation, medical, and financial systems."
    slide_context: "seL4 Kernel; Use Cases; Deployment Scenarios; SMB Environment"
    key_stat: "seL4's formal proofs go beyond what the most stringent levels of Common Criteria, ISO 26262, and DO-178C require for software development."

  - url: "https://www.dornerworks.com/blog/sel4-linux-foundation/"
    title: "seL4 Foundation Backed by Linux Foundation, Founding Members DornerWorks and Others"
    year: "2020"
    publisher: "DornerWorks"
    relevance: "Connects seL4 to the DARPA HACMS (High-Assurance Cyber Military Systems) program, the highest-profile demonstration of a verified kernel in regulated/defense deployment. The HACMS red-team result is the single most persuasive data point for PointSav's argument that formal verification yields real-world attack resistance."
    slide_context: "seL4 Kernel; Use Cases; Private Network; Authentication"
    key_stat: "In the DARPA HACMS program, seL4 was embedded in Boeing's Unmanned Little Bird helicopter; the red team was unable to compromise its security in flight."

  # ---- (3) open-core vs dual-license enterprise models ----
  - url: "https://www.hashicorp.com/en/blog/hashicorp-adopts-business-source-license"
    title: "HashiCorp adopts Business Source License"
    year: "2023"
    publisher: "HashiCorp"
    relevance: "The canonical vendor announcement of a major open-to-source-available license shift, defining the exact commercial boundary: non-competitive use stays free, competing hosted resale is restricted. Essential primary source for PointSav's Licensing Model and Economic Model slides explaining what triggers a commercial boundary."
    slide_context: "Licensing Model; Economic Model; Products & Services"
    key_stat: "On 10 August 2023 HashiCorp moved Terraform, Vault, Consul, Nomad, Packer, Boundary, Waypoint, and Vagrant from MPL 2.0 to the Business Source License (BSL) v1.1; APIs and SDKs remained MPL 2.0."

  - url: "https://www.elastic.co/blog/licensing-change"
    title: "Doubling Down on Open, Part II"
    year: "2021"
    publisher: "Elastic"
    relevance: "Primary vendor statement of the Apache-2.0-to-SSPL/Elastic-License shift, the move that triggered the OpenSearch fork. Demonstrates the open-core/source-available commercial trigger (cloud-provider resale) and the fork risk, directly informing PointSav's licensing-strategy positioning."
    slide_context: "Licensing Model; Economic Model; Repositories"
    key_stat: "In January 2021 Elastic relicensed Elasticsearch and Kibana from Apache 2.0 to dual SSPL / Elastic License v2 to restrict cloud providers from offering them as a service — prompting AWS to fork OpenSearch."

  - url: "https://www.goodwinlaw.com/en/insights/publications/2024/09/insights-practices-moving-away-from-open-source-trends-in-licensing"
    title: "Moving Away From Open Source: Trends in Source-Available Licensing"
    year: "2024"
    publisher: "Goodwin Procter LLP"
    relevance: "An independent law-firm analysis distinguishing true open source (OSI-approved) from source-available licenses (BSL, SSPL, Elastic License) and the legal mechanics of the commercial boundary. Provides the neutral, authoritative framing PointSav needs to position its own licensing model accurately on the Licensing Model slide."
    slide_context: "Licensing Model; Documentation Standards; Economic Model"
    key_stat: "BSL, SSPL, and the Elastic License are source-available, NOT OSI-approved open source — they permit viewing/modification but restrict competitive commercial (notably hosted-service) use."

  - url: "https://www.termsfeed.com/blog/dual-licensing-vs-open-core/"
    title: "Dual Licensing vs. Open Core: Legal Distinctions Every Business Should Understand"
    year: "2024"
    publisher: "TermsFeed"
    relevance: "Concise legal explainer clarifying the core distinction — dual licensing is choice-based (one product, alternative terms) while open core is boundary-based (two products from the start). This taxonomy lets PointSav state precisely which model its repositories follow on the Licensing Model and Repositories slides."
    slide_context: "Licensing Model; Repositories; Products & Services"
    key_stat: "Dual licensing offers one product under alternative license terms; open core ships a free core plus a separate proprietary edition — a choice-based vs. boundary-based distinction."
