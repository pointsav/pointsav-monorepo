---
id: datagraph-pointsav
label: PointSav Design System Slides DataGraph
schema: foundry-datagraph-flat-v1
created: 2026-06-14
status: independent

description: >
  Flat-file YAML knowledge graph for the PointSav Design System Slides project.
  Catalogs all 141 pages of the V5 master deck, cross-referenced with 7 category
  research corpora and synthesized into a priority-ordered slide production list.
  Independent from service-content until slides are complete and reviewed.

scope:
  source_v5_pdf: 141 pages (Ch.1–Ch.9)
  source_jw4_html: 48 slides (7-category TOC, JW4 rev)
  output_jw5_html: 73 slides (+22 new across 6 categories)
  research_categories: 7 (one per TOC category)

integration:
  target: service-content DataGraph (local-content.service)
  path: corpus ingestion pipeline (submit_extraction / CORPUS sweep)
  gate: JW5.html promoted to Stage 6 + operator review complete
  status: deferred

entry_points:
  synthesis: synthesis.yaml          # priority list + capacity + augment plan
  index: index.yaml                  # all 141 V5 pages, one entry each
  jw4_inventory: jw4-inventory.yaml  # JW4 slide inventory

chapters:
