category: "06 Multi-Entity Consolidation"
sources:
  - url: "https://eur-lex.europa.eu/eli/reg/2023/2854/oj/eng"
    title: "Regulation (EU) 2023/2854 (Data Act) — harmonised rules on fair access to and use of data"
    relevance: "Mandates free, fast switching across IaaS/PaaS/SaaS and the right to run multiple providers simultaneously or migrate on-prem — the regulatory tailwind for stateless multi-archive aggregation without vendor lock-in."
    slide_context: "Deployment Tiers Matrix — SaaS/PaaS/IaaS across tenants (Managed/Hosted/On-Prem/Self-Hosted)"
    published: "2023"
    source_type: "regulatory"

  - url: "https://www.sec.gov/investment/amendments-electronic-recordkeeping-requirements-broker-dealers"
    title: "SEC: Amendments to Electronic Recordkeeping Requirements for Broker-Dealers (Rule 17a-4)"
    relevance: "Codifies WORM (write-once, read-many) non-rewriteable, non-erasable storage as the regulatory standard for immutable financial records — the compliance basis for ToteboxOS WORM flat-file archives."
    slide_context: "Totebox OS / Totebox Archive (multiple archives) — WORM immutability for the pension/asset-manager audience"
    published: "2022"
    source_type: "regulatory"

  - url: "https://csrc.nist.gov/pubs/sp/800/207/final"
    title: "NIST SP 800-207: Zero Trust Architecture"
    relevance: "Defines the shift from network-perimeter trust to per-request authorization with no implicit trust — the canonical framing for machine-based authorization where network topology is the permission system, no credential DB."
    slide_context: "Section divider / ConsoleOS F-Keys + machine-based authorization context across all 06 slides"
    published: "2020"
    source_type: "standards"

  - url: "https://csrc.nist.gov/pubs/sp/800/207/a/final"
    title: "NIST SP 800-207A: A Zero Trust Architecture Model for Access Control in Cloud-Native Applications in Multi-Cloud Environments"
    relevance: "Specifies identity-based access policy enforced irrespective of service location across multiple cloud and on-prem environments — directly maps to stateless aggregation over geographically distributed archives."
    slide_context: "Totebox Orchestration — three-layer delivery/edge/network architecture"
    published: "2023"
    source_type: "standards"

  - url: "https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-145.pdf"
    title: "NIST SP 800-145: The NIST Definition of Cloud Computing"
    relevance: "The authoritative definition of the SaaS/PaaS/IaaS service models and private/public/community/hybrid deployment models that the Deployment Tiers Matrix is built on."
    slide_context: "Deployment Tiers Matrix — SaaS/PaaS/IaaS across tenants; Virtualization on-prem/leased/cloud"
    published: "2011"
    source_type: "standards"

  - url: "https://csrc.nist.gov/pubs/sp/800/63/b/4/final"
    title: "NIST SP 800-63B-4: Digital Identity Guidelines — Authentication and Authenticator Management"
    relevance: "Establishes the Authenticator Assurance Level framework for binding subjects to credentials — the standards reference distinguishing PointSav's machine-based, no-credential-DB authorization from conventional identity stores."
    slide_context: "Scaling Option A — Interface vs Infrastructure (Owner/Operator console authorization paths)"
    published: "2025"
    source_type: "standards"

  - url: "https://spiffe.io/docs/latest/spiffe-specs/spiffe/"
    title: "SPIFFE: Secure Production Identity Framework for Everyone — Specification"
    relevance: "Open standard (CNCF graduated) for cryptographically verifiable workload identity without shared secrets — the closest industry analogue to PointSav's principle that the network topology itself confers authorization."
    slide_context: "Totebox Orchestration — three-layer delivery/edge/network architecture; machine-based authorization framing for the developer audience"
    published: "2023"
    source_type: "standards"

  - url: "https://arxiv.org/abs/2103.13333"
    title: "A Multi-Tenant Framework for Cloud Container Services (Virtual-Cluster)"
    relevance: "Peer-reviewed treatment of control-plane plus data-plane tenant isolation while sharing underlying compute — the engineering grounding for multi-archive aggregation that keeps tenant boundaries hard."
    slide_context: "Command Center / Totebox aggregation across multiple archives; multi-tenant vs single-tenant isolation"
    published: "2021"
    source_type: "academic"

  - url: "https://arxiv.org/abs/2201.13010"
    title: "Architectures for Protecting Cloud Data Planes (Cloud Landing Point)"
    relevance: "Google-authored analysis of isolating individual cloud workloads from one another via a perimeter construct — supports the commercial-boundary argument for stateless aggregation that never co-mingles tenant data."
    slide_context: "OrchestrationOS (paid) cross-entity aggregation with hard commercial boundaries"
    published: "2022"
    source_type: "academic"

  - url: "https://www.highalpha.com/saas-benchmarks/2024"
    title: "2024 SaaS Benchmarks Report (High Alpha / OpenView)"
    relevance: "Quantifies land-and-expand economics — enterprise NRR ~118% vs SMB ~97%, expansion ARR rising to ~40% of new ARR by 2024 — the commercial proof point for the paid OrchestrationOS upsell tier to the investor audience."
    slide_context: "Scaling tiers — Individual/Group/Organization; OrchestrationOS paid upgrade as land-and-expand motion"
    published: "2024"
    source_type: "analyst_report"

  - url: "https://www.gartner.com/en/information-technology/glossary/software-as-a-service-saas"
    title: "Gartner: Software as a Service (SaaS) — multi-tenant architecture definition"
    relevance: "Gartner's framing that multi-tenant SaaS efficiency depends on guaranteeing Tenant A can never see Tenant B's data establishes the isolation bar PointSav's stateless aggregation must clear for an analyst-literate investor."
    slide_context: "Command Center / Totebox aggregation — multi-tenant vs single-tenant data isolation"
    published: "2024"
    source_type: "analyst_report"

  - url: "https://www.sec.gov/rules-regulations/staff-guidance/trading-markets-frequently-asked-questions/rule-amendments-broker"
    title: "SEC FAQ: Rule Amendments to Broker-Dealer Electronic Recordkeeping Requirements"
    relevance: "Clarifies the WORM-vs-audit-trail compliance alternatives and the two-year immediate-accessibility mandate — operational detail for positioning ToteboxOS flat-file archives against regulated-industry buyers."
    slide_context: "Totebox OS / Totebox Archive — immutability and retention compliance detail"
    published: "2023"
    source_type: "regulatory"
