category: "03 System of Record"
sources:
  - url: "https://www.sec.gov/investment/amendments-electronic-recordkeeping-requirements-broker-dealers"
    title: "Amendments to Electronic Recordkeeping Requirements for Broker-Dealers (Rule 17a-4)"
    relevance: "Primary regulatory text mandating WORM (write-once-read-many) non-rewriteable, non-erasable storage — or a tamper-proof audit trail — as the legal floor for an investment firm's system of record, exactly what ToteboxOS WORM flat-file archives implement."
    slide_context: "WORM Record Format — Database vs Flat-File System (file-name-as-reference); WORM Record / flat-file existing slides"
    published: "2022"
    source_type: "regulatory"

  - url: "https://www.sec.gov/rules-regulations/staff-guidance/trading-markets-frequently-asked-questions/rule-amendments-broker"
    title: "SEC FAQ — Rule Amendments to Broker-Dealer Electronic Recordkeeping Requirements"
    relevance: "SEC staff defines the audit-trail alternative to WORM (time-stamped record of every create/modify/delete with operator identity), which maps directly to PointSav's F12 human checkpoint and ConsoleOS operator-attributed write semantics for investor audiences."
    slide_context: "WORM Record Format — Chart-of-Accounts File Naming in the Totebox Flat-File Archive; F-Keys console / F12 checkpoint"
    published: "2023"
    source_type: "regulatory"

  - url: "https://www.finra.org/rules-guidance/key-topics/books-records"
    title: "FINRA Rule 4511 — Books and Records General Requirements"
    relevance: "Extends the WORM/17a-4 storage obligation to all FINRA member firms with a six-year minimum retention floor that administrators cannot technically override — the compliance argument for an immutable flat-file archive over a mutable Bookkeeper DB."
    slide_context: "WORM Record Format — Database vs Flat-File System; Bookkeeper DB vs WORM record"
    published: "2024"
    source_type: "regulatory"

  - url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32023R2854"
    title: "Regulation (EU) 2023/2854 (Data Act) — Chapter VI, Switching Between Data Processing Services"
    relevance: "EU Data Act mandates portable, structured, machine-readable export and the elimination of vendor lock-in — the regulatory tailwind for PointSav's flat-file, file-name-as-reference archives that any party can read without a proprietary database."
    slide_context: "Totebox OS File System and Partition Layout; data sovereignty positioning for pension/asset-manager investors"
    published: "2023"
    source_type: "regulatory"

  - url: "https://digital-strategy.ec.europa.eu/en/factpages/data-act-explained"
    title: "Data Act Explained — European Commission, Shaping Europe's Digital Future"
    relevance: "Authoritative Commission summary of the data-portability and interoperability obligations, useful as the plain-language sovereignty framing for the dual developer/investor audience without quoting raw legal articles."
    slide_context: "Totebox OS File System and Partition Layout; OrchestrationOS multi-archive aggregation sovereignty case"
    published: "2025"
    source_type: "regulatory"

  - url: "https://nvlpubs.nist.gov/nistpubs/specialpublications/NIST.SP.800-207.pdf"
    title: "NIST SP 800-207 — Zero Trust Architecture"
    relevance: "Defines the Policy Decision Point / Policy Enforcement Point model where access is granted per-request with no implicit network trust — the standards-body grounding for PointSav's machine-based authorization where network topology IS the permission system (no credential DB)."
    slide_context: "Machine-based authorization / network-topology-as-permission; ConsoleOS role-based consoles"
    published: "2020"
    source_type: "standards"

  - url: "https://pages.nist.gov/800-63-3/sp800-63b.html"
    title: "NIST SP 800-63B — Digital Identity Guidelines: Authentication and Lifecycle Management"
    relevance: "Establishes authenticator-assurance levels and the principle that credentials are secrets requiring hardened storage — the contrast PointSav draws by eliminating the credential database entirely in favour of topology-bound machine authorization."
    slide_context: "Machine-based authorization with no credential DB; ConsoleOS / network topology permission slides"
    published: "2017"
    source_type: "standards"

  - url: "https://www.iso.org/standard/74338.html"
    title: "ISO 14641:2018 — Electronic Document Management: Design and Operation of an Information System for the Preservation of Electronic Documents"
    relevance: "International standard specifying physical and logical WORM media, fidelity, integrity and traceability for the lifetime of a record — the ISO anchor validating ToteboxOS flat-file permanence claims to international investors."
    slide_context: "WORM Record / flat-file existing slides; Totebox OS File System and Partition Layout"
    published: "2018"
    source_type: "standards"

  - url: "https://nvlpubs.nist.gov/nistpubs/specialpublications/nist.sp.800-190.pdf"
    title: "NIST SP 800-190 — Application Container Security Guide"
    relevance: "Authoritative treatment of OS-level virtualization (containers vs. bare metal/VM isolation) and per-app single-OS views — the standards basis for the Console OS / Interface OS / VM layering and containers-vs-bare-metal concepts in this category."
    slide_context: "Console OS / Interface OS / Totebox OS / VM; containers, bare metal, OS-level virtualization"
    published: "2017"
    source_type: "standards"

  - url: "https://datatracker.ietf.org/doc/html/rfc6920"
    title: "RFC 6920 — Naming Things with Hashes"
    relevance: "IETF standard for using cryptographic hash output (SHA-256 mandatory) as a verifiable content identifier — the protocol precedent for PointSav's file-name-as-reference / SHA-256 immutable addressing in the Chart-of-Accounts naming convention."
    slide_context: "WORM Record Format — Chart-of-Accounts File Naming (file-name-as-reference); file naming convention; duplicate-across-archives"
    published: "2013"
    source_type: "standards"

  - url: "https://www.ecfr.gov/current/title-17/chapter-I/part-1/subject-group-ECFR26e2c365a191fa7/section-1.31"
    title: "17 CFR 1.31 — CFTC Regulatory Records: Retention and Production"
    relevance: "Technology-neutral federal mandate requiring records retained in a form ensuring authenticity and reliability, readily accessible for the full retention period — corroborating the system-of-record durability case beyond broker-dealer rules."
    slide_context: "WORM Record Format — Database vs Flat-File System; Bookkeeper DB / Bookkeeping slides"
    published: "2017"
    source_type: "regulatory"

  - url: "https://www.gartner.com/en/documents/5572027"
    title: "Gartner — Hype Cycle for Digital Sovereignty, 2024"
    relevance: "Analyst framing of data, operational and technological sovereignty as a board-level imperative — the market-validation slide for the pension-fund/asset-manager investor audience that PointSav's sovereign WORM archive addresses."
    slide_context: "Data sovereignty market positioning; OrchestrationOS multi-archive aggregation investor thesis"
    published: "2024"
    source_type: "analyst_report"
