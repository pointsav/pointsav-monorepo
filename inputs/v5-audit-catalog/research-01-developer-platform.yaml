category: "01 Developer Platform"
sources:
  # --- 1. Primary regulatory text ---
  - url: "https://eur-lex.europa.eu/eli/reg/2023/2854/oj"
    title: "Regulation (EU) 2023/2854 (Data Act) — fair access to and use of data"
    relevance: "Chapter VI/VIII switching-and-interoperability mandates and Chapter VII non-EU-access safeguards are the legal tailwind for stateless multi-archive aggregation and customer-held flat-file ownership."
    slide_context: "SMB Environment / Deployment Scenarios; underpins data-sovereignty thesis for the investor leg of the dual audience"
    published: "2023"
    source_type: "regulatory"

  - url: "https://www.sec.gov/investment/amendments-electronic-recordkeeping-requirements-broker-dealers"
    title: "SEC Amendments to Electronic Recordkeeping Requirements for Broker-Dealers (Rule 17a-4)"
    relevance: "Codifies the WORM (non-rewriteable, non-erasable) and audit-trail recordkeeping standard that ToteboxOS flat-file archives are built to satisfy — direct regulatory anchor for asset-manager investors."
    slide_context: "Totebox Orchestration / Console OS; WORM archive value proposition to pension-fund and asset-manager audience"
    published: "2022"
    source_type: "regulatory"

  - url: "https://nvlpubs.nist.gov/nistpubs/specialpublications/NIST.SP.800-207.pdf"
    title: "NIST SP 800-207: Zero Trust Architecture"
    relevance: "Establishes resource-centric, no-implicit-trust authorization as the federal reference model, mapping directly to PointSav machine-based authorization where network topology IS the permission system."
    slide_context: "Command Center / Infrastructure OS; machine-based authorization with no credential DB"
    published: "2020"
    source_type: "regulatory"

  - url: "https://csrc.nist.gov/pubs/sp/800/63/b/4/final"
    title: "NIST SP 800-63B-4: Digital Identity Guidelines — Authentication and Authenticator Management"
    relevance: "The federal authenticator-assurance baseline against which a credential-DB-free, topology-derived authorization model is positioned as a structurally distinct approach."
    slide_context: "Console OS F12 human checkpoint / role-based consoles; no-credential-database posture"
    published: "2024"
    source_type: "regulatory"

  # --- 2. Standards bodies ---
  - url: "https://www.iso.org/standard/74393.html"
    title: "ISO/IEC/IEEE 42010:2022 — Software, systems and enterprise — Architecture description"
    relevance: "The international architecture-description standard PointSav documentation conforms to, giving the Documentation Standards slide a citable conformance claim for technical and procurement audiences."
    slide_context: "Documentation Standards — UML, C4, 4+1, ISO/IEC 42010 (planned)"
    published: "2022"
    source_type: "standards"

  - url: "https://www.omg.org/spec/UML/2.5.1/About-UML/"
    title: "OMG Unified Modeling Language (UML) Specification Version 2.5.1"
    relevance: "Canonical UML standard cited as one of the four documentation notations PointSav adopts for cross-system rendering and console-construction artifacts."
    slide_context: "Documentation Standards — UML, C4, 4+1, ISO/IEC 42010 (planned); Cross-System Rendering Design"
    published: "2017"
    source_type: "standards"

  - url: "https://spinroot.com/gerard/pdf/P10.pdf"
    title: "The Power of Ten — Rules for Developing Safety-Critical Code (G. J. Holzmann, NASA/JPL)"
    relevance: "The ten safety-critical coding rules that justify PointSav's Rust + constrained-control-flow engineering posture to the developer audience and the reliability posture to investors."
    slide_context: "Coding Guidelines — Power of 10 Safety-Critical Rules (planned)"
    published: "2006"
    source_type: "standards"

  # --- 4. Academic papers ---
  - url: "https://www.computer.org/csdl/magazine/so/1995/06/s6042/13rRUxBJhBm"
    title: "Architectural Blueprints — The '4+1' View Model of Software Architecture (P. Kruchten, IEEE Software 12(6):42-50)"
    relevance: "The foundational multi-view documentation framework cited for organizing PointSav architecture descriptions across stakeholder concerns (logical/process/physical/development + scenarios)."
    slide_context: "Documentation Standards — UML, C4, 4+1, ISO/IEC 42010 (planned)"
    published: "1995"
    source_type: "academic"

  - url: "https://dl.acm.org/doi/10.1109/52.469759"
    title: "The 4+1 View Model of Architecture (ACM Digital Library / DOI 10.1109/52.469759)"
    relevance: "DOI-resolvable citation for the 4+1 view model, supplying the formal reference needed for an academically credible Documentation Standards slide."
    slide_context: "Documentation Standards — UML, C4, 4+1, ISO/IEC 42010 (planned)"
    published: "1995"
    source_type: "academic"

  # --- 3. Analyst reports ---
  - url: "https://www.gartner.com/en/documents/5028931"
    title: "Gartner — Consult the Board: Use of Open-Source Software"
    relevance: "Analyst confirmation that >90% of enterprises run OSS (including mission-critical) and that vendor independence drives contribution — the demand-side evidence for an open-source base-node licensing tier."
    slide_context: "Licensing Model — Open-Source Base Nodes vs Proprietary Tiers (planned); Approved Contributors"
    published: "2024"
    source_type: "analyst_report"

  - url: "https://www.gartner.com/en/documents/3991495"
    title: "Gartner — Adoption of an Open-Source Strategy"
    relevance: "Analyst guidance on OSPO governance, contributor vetting, and the developer-inclusive decision model that frames PointSav's Approved Contributors / contributor-selection program."
    slide_context: "Approved Contributors / Contributors; contributor discovery and vetting"
    published: "2020"
    source_type: "analyst_report"

  # --- 5. Major vendor / standards-community documentation ---
  - url: "https://c4model.com/"
    title: "The C4 model for visualising software architecture (Simon Brown)"
    relevance: "The authoritative C4 reference for the developer-friendly, models-as-code diagramming PointSav uses across Console Construction and Cross-System Rendering documentation."
    slide_context: "Documentation Standards — UML, C4, 4+1, ISO/IEC 42010 (planned); Console Construction"
    published: "2024"
    source_type: "vendor"

  - url: "https://www.writethedocs.org/guide/docs-as-code/"
    title: "Docs as Code — Write the Docs Guide"
    relevance: "Community-standard reference defining the version-controlled, PR-reviewed documentation pipeline that PointSav's documentation-delivery method and contributor workflow are built on."
    slide_context: "Documentation Delivery Method — Section Map (planned); Documentation"
    published: "2024"
    source_type: "vendor"

  - url: "https://en.wikipedia.org/wiki/Open-core_model"
    title: "Open-core model — definition, structure, and exemplars (GitLab, Grafana)"
    relevance: "Reference articulation of the open-source-core + proprietary-tier structure that the planned Licensing Model slide adopts (free base nodes; paid OrchestrationOS / enterprise features)."
    slide_context: "Licensing Model — Open-Source Base Nodes vs Proprietary Tiers (planned); Support Channels — Commercial and Community (planned)"
    published: "2024"
    source_type: "vendor"
