category: "07 Platform Foundation"
sources:
  # --- Tier 1: Primary regulatory text ---
  - url: "https://eur-lex.europa.eu/eli/reg/2023/2854/oj/eng"
    title: "Regulation (EU) 2023/2854 (Data Act) — official consolidated text, EUR-Lex"
    relevance: "Chapter VI (Arts 23-31) makes cloud data portability and barrier-free switching a binding right, validating PointSav's WORM flat-file archive and stateless aggregation as anti-lock-in architecture for the EU market."
    slide_context: "Platform OS Matrix — Nine Operating Systems by Tier and Licensing (open-source/portable positioning of ToteboxOS + OrchestrationOS)"
    published: "2023"
    source_type: "regulatory"

  - url: "https://www.sec.gov/investment/amendments-electronic-recordkeeping-requirements-broker-dealers"
    title: "SEC Final Rule: Amendments to Electronic Recordkeeping Requirements for Broker-Dealers (Rule 17a-4)"
    relevance: "Codifies the write-once-read-many (WORM) non-rewriteable/non-erasable standard for regulated electronic records, which is exactly the guarantee ToteboxOS flat-file archives provide for pension-fund/asset-manager audiences."
    slide_context: "Totebox OS — WORM flat-file archive (Platform OS Matrix tier; investor compliance proof point)"
    published: "2022"
    source_type: "regulatory"

  - url: "https://csrc.nist.gov/pubs/sp/800/207/final"
    title: "NIST SP 800-207, Zero Trust Architecture"
    relevance: "Establishes that trust must derive from per-resource authorization rather than network location, the standards anchor for PointSav's claim that machine-based topology IS the permission system."
    slide_context: "seL4 Kernel Foundation / network-topology-as-permission framing (Platform Foundation security posture)"
    published: "2020"
    source_type: "regulatory"

  - url: "https://csrc.nist.gov/pubs/sp/800/63/b/4/final"
    title: "NIST SP 800-63B-4, Digital Identity Guidelines: Authentication and Authenticator Management"
    relevance: "The federal authentication standard against which PointSav's no-credential-DB, machine-based authorization model can be contrasted as eliminating the shared-secret store entirely."
    slide_context: "Platform Foundation — machine-based authorization (no credential DB) contrast point"
    published: "2024"
    source_type: "regulatory"

  # --- Tier 2: Standards bodies ---
  - url: "https://nvlpubs.nist.gov/nistpubs/specialpublications/nist.sp.800-190.pdf"
    title: "NIST SP 800-190, Application Container Security Guide"
    relevance: "Documents the weaker shared-kernel isolation boundary of containers, the standards basis for arguing that VM/microkernel separation (seL4) gives stronger tenant isolation than container-on-shared-OS."
    slide_context: "Operating Systems Matrix — container vs virtualization vs kernel/hypervisor isolation comparison"
    published: "2017"
    source_type: "standards"

  - url: "https://csrc.nist.gov/pubs/sp/800/207/a/final"
    title: "NIST SP 800-207A, Zero Trust Architecture Model for Access Control in Cloud-Native Apps in Multi-Cloud Environments"
    relevance: "Extends ZTA to multi-cloud/multi-environment access control, mapping directly onto OrchestrationOS stateless multi-archive aggregation across trust boundaries."
    slide_context: "Orchestration OS — stateless multi-archive aggregation (Platform OS Matrix paid tier)"
    published: "2023"
    source_type: "standards"

  # --- Tier 3: Analyst reports ---
  - url: "https://www.gartner.com/en/documents/5572027"
    title: "Gartner — Hype Cycle for Digital Sovereignty, 2024"
    relevance: "Frames digital sovereignty (autonomy over data, operations, infrastructure within geographic/regulatory boundaries) as a 2024 strategic imperative, the analyst validation for PointSav's data-sovereignty-for-SMBs thesis to investors."
    slide_context: "Platform Foundation overview / sovereign positioning (investor framing across the OS matrix)"
    published: "2024"
    source_type: "analyst_report"

  - url: "https://www.gartner.com/en/documents/5863580"
    title: "Gartner — Forecast Analysis: Sovereign Cloud IaaS, Worldwide"
    relevance: "Sizes the sovereign cloud IaaS market at ~$37B growing to ~$169B by 2028 (36% CAGR), the TAM evidence pension-fund/asset-manager investors need for the sovereignty platform thesis."
    slide_context: "Co-location Investment Thesis / Platform Foundation market-sizing slide (investor audience)"
    published: "2024"
    source_type: "analyst_report"

  # --- Tier 4: Academic papers ---
  - url: "https://dl.acm.org/doi/10.1145/1629575.1629596"
    title: "seL4: Formal Verification of an OS Kernel (Klein et al., SOSP '09), DOI 10.1145/1629575.1629596"
    relevance: "The original machine-checked functional-correctness proof of seL4 from abstract spec to C, the foundational citation for the verified-microkernel claim on the Totebox archive foundation slide."
    slide_context: "seL4 Kernel Foundation — Verified Microkernel for the Totebox Archive"
    published: "2009"
    source_type: "academic"

  - url: "https://sel4.systems/Research/pdfs/comprehensive-formal-verification-os-microkernel.pdf"
    title: "Comprehensive Formal Verification of an OS Microkernel (Klein et al., ACM TOCS)"
    relevance: "Extends the proof to integrity, confidentiality and binary-level correctness, supporting the strongest formulation of seL4 assurance for a Rust-developer audience that will scrutinise the verification scope."
    slide_context: "seL4 Kernel Foundation — Verified Microkernel for the Totebox Archive (developer-audience depth)"
    published: "2014"
    source_type: "academic"

  - url: "https://arxiv.org/pdf/1911.06260"
    title: "A Security Perspective on Unikernels (Talbot et al.)"
    relevance: "Surveys unikernel minimal-attack-surface and per-VM isolation properties, supporting the case for single-purpose isolated OS images over general-purpose shared OSes in the platform matrix."
    slide_context: "Operating Systems Matrix — unikernel/minimal-OS vs general-purpose OS isolation"
    published: "2020"
    source_type: "academic"

  - url: "https://arxiv.org/pdf/2310.17046"
    title: "Proving the Absence of Microarchitectural Timing Channels (seL4 time protection)"
    relevance: "Demonstrates seL4 verified mitigation of timing side-channels, the assurance level that distinguishes the Totebox foundation from conventional hypervisor isolation for high-trust financial data."
    slide_context: "seL4 Kernel Foundation — Verified Microkernel for the Totebox Archive (side-channel assurance)"
    published: "2023"
    source_type: "academic"

  # --- Tier 5: Major vendor / authoritative project documentation ---
  - url: "https://sel4.systems/About/seL4-whitepaper.pdf"
    title: "The seL4 Microkernel — An Introduction (seL4 Foundation whitepaper)"
    relevance: "Authoritative project overview of seL4 architecture, capability model and performance, the canonical reference for the kernel/hypervisor foundation row of the OS matrix."
    slide_context: "Operating Systems Matrix — kernel / hypervisor foundation; seL4 Kernel Foundation slide"
    published: "2024"
    source_type: "vendor"

  - url: "https://sel4.systems/About/history.html"
    title: "seL4 History — DARPA HACMS incremental cyber-retrofit and Boeing Unmanned Little Bird"
    relevance: "Documents seL4's real-world deployment in DARPA HACMS autonomous vehicles where a professional red team could not break out of the verified isolation, a concrete proof point for the verified-microkernel claim."
    slide_context: "seL4 Kernel Foundation — Verified Microkernel for the Totebox Archive (deployment evidence)"
    published: "2024"
    source_type: "vendor"

  - url: "https://sel4.systems/news/2024.html"
    title: "seL4 News 2024 — DARPA PROVERS / INSPECTA program updates"
    relevance: "Current evidence that seL4 verification tooling is being industrialised for non-expert engineers (DARPA PROVERS/INSPECTA), countering the 'formal methods are impractical' objection from the developer audience."
    slide_context: "seL4 Kernel Foundation — Verified Microkernel for the Totebox Archive (ongoing-investment proof)"
    published: "2024"
    source_type: "vendor"
