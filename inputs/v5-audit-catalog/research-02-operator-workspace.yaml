category: "02 Operator Workspace"
sources:
  - url: "https://artificialintelligenceact.eu/article/14/"
    title: "Article 14: Human Oversight — EU Artificial Intelligence Act"
    relevance: "Mandates that high-risk AI systems be designed with human-machine interface tools enabling a natural person to oversee, interpret output, and decide not to use or disregard the system — the regulatory backbone for the F12 human checkpoint."
    slide_context: "ConsoleOS chapter / F12 human checkpoint; F* keys console slide; Console Construction divider"
    published: "2024"
    source_type: "regulatory"

  - url: "https://www.sec.gov/investment/amendments-electronic-recordkeeping-requirements-broker-dealers"
    title: "SEC Amendments to Electronic Recordkeeping Requirements for Broker-Dealers (Rule 17a-4)"
    relevance: "Retains the WORM (write-once-read-many) immutability standard as a recognized recordkeeping option, the regulatory anchor for ToteboxOS WORM flat-file archives that pension-fund and asset-manager investors recognize."
    slide_context: "Totebox Archive (Corporate / Building) slide; Minutebook DB / Bookkeeper DB WORM persistence"
    published: "2022"
    source_type: "regulatory"

  - url: "https://digital-strategy.ec.europa.eu/en/policies/data-act"
    title: "Data Act — Shaping Europe's Digital Future (Regulation (EU) 2023/2854)"
    relevance: "Establishes user rights to access, port, and switch data away from vendor cloud lock-in (switching fees banned from 2027), the policy tailwind for PointSav's customer-owned flat-file archives and stateless aggregation."
    slide_context: "Totebox Archive ownership model; 3rd party network access; Interface OS routing (data portability framing)"
    published: "2023"
    source_type: "regulatory"

  - url: "https://csrc.nist.gov/pubs/sp/800/207/final"
    title: "NIST SP 800-207: Zero Trust Architecture"
    relevance: "Defines Policy Decision Point / Policy Enforcement Point model where access is granted per-request with no implicit network-location trust — the formal standard underpinning PointSav's claim that network topology IS the permission system."
    slide_context: "Pairing as permissions (P1/P4) slide; machine-based authorization with no credential DB; 3rd party network access"
    published: "2020"
    source_type: "standards"

  - url: "https://csrc.nist.gov/pubs/sp/800/63/b/upd2/final"
    title: "NIST SP 800-63B: Digital Identity Guidelines — Authentication and Lifecycle Management"
    relevance: "Defines authenticator assurance levels (AAL1-AAL3) and hardware/cryptographic authentication — the credentialing baseline PointSav displaces by binding authorization to paired machines rather than a credential database."
    slide_context: "Machine-based authorization (no credential DB); Pairing as permissions (P1/P4)"
    published: "2017"
    source_type: "standards"

  - url: "https://www.iso.org/standard/77520.html"
    title: "ISO 9241-210:2019 — Ergonomics of human-system interaction, Part 210: Human-centred design for interactive systems"
    relevance: "International standard for human-centred design of interactive systems including process-control consoles, validating the role-based console UX discipline of ConsoleOS for a developer audience."
    slide_context: "Console Construction divider; ConsoleOS / Console OS; Site Super console, BIM console, Maps console, Input Machine Console"
    published: "2019"
    source_type: "standards"

  - url: "https://webstore.ansi.org/standards/incits/ansiincits3592004"
    title: "ANSI/INCITS 359 — Information Technology: Role Based Access Control (RBAC)"
    relevance: "The formal RBAC reference model (users, roles, permissions, objects) is the recognized standard PointSav's role-based consoles map to, giving institutional investors a known compliance vocabulary."
    slide_context: "Role-based consoles (ConsoleOS); Site Super console / BIM console / Maps console per-role surfaces"
    published: "2004"
    source_type: "standards"

  - url: "https://csrc.nist.gov/pubs/sp/800/125/final"
    title: "NIST SP 800-125: Guide to Security for Full Virtualization Technologies"
    relevance: "Authoritative NIST treatment of hypervisor/VM isolation security, supporting the Type II Hypervisor concept used to host isolated operator workspaces and consoles."
    slide_context: "Type II Hypervisor slide; Console Construction / Interface OS routing isolation"
    published: "2011"
    source_type: "standards"

  - url: "https://iapp.org/news/a/eu-ai-act-shines-light-on-human-oversight-needs"
    title: "Under the EU AI Act, high-risk systems require a human touch (IAPP analysis)"
    relevance: "Practitioner analysis from the leading privacy/governance professional body explaining what Article 14 human oversight obligations mean operationally — translates the F12 checkpoint into compliance-officer language for investors."
    slide_context: "ConsoleOS / F12 human checkpoint; section divider framing for the human-oversight thesis"
    published: "2024"
    source_type: "analyst_report"

  - url: "https://www.gartner.com/en/newsroom/press-releases/2026-02-17-gartner-global-ai-regulations-fuel-billion-dollar-market-for-ai-governance-platforms"
    title: "Gartner: Global AI Regulations Fuel Billion-Dollar Market for AI Governance Platforms"
    relevance: "Gartner sizes the AI-governance/oversight market and finds governed deployments 3.4x more effective — the market-tailwind data point that frames the F12 human checkpoint as an investable category, not a feature."
    slide_context: "ConsoleOS chapter opener; F12 human checkpoint value proposition (investor slide)"
    published: "2026"
    source_type: "analyst_report"

  - url: "https://academic.oup.com/jpart/article/33/1/153/6524536"
    title: "Human–AI Interactions in Public Sector Decision Making: Automation Bias and Selective Adherence to Algorithmic Advice"
    relevance: "Peer-reviewed evidence (DOI:10.1093/jopart/muac007) that humans defer to automated advice (automation bias), the empirical justification for a mandatory, designed human-authorization checkpoint rather than optional review."
    slide_context: "F12 human checkpoint rationale; ConsoleOS oversight-by-design argument"
    published: "2023"
    source_type: "academic"

  - url: "https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0298037"
    title: "Putting a Human in the Loop: Increasing Uptake, but Decreasing Accuracy of Automated Decision-Making"
    relevance: "Peer-reviewed study (DOI:10.1371/journal.pone.0298037) showing human-in-the-loop design choices materially change outcomes — supports PointSav's specific console-construction approach to where and how the F12 checkpoint sits."
    slide_context: "Console Construction divider; F12 human checkpoint design slide"
    published: "2024"
    source_type: "academic"

  - url: "https://arxiv.org/pdf/2502.10036"
    title: "Automation Bias in the AI Act: On the Legal Implications of Attempting to De-Bias Human Oversight of AI"
    relevance: "Academic bridge connecting automation-bias research directly to EU AI Act Article 14 obligations, the strongest single source tying the regulatory mandate to the cognitive-science evidence behind F12."
    slide_context: "ConsoleOS / F12 human checkpoint; section divider thesis statement"
    published: "2025"
    source_type: "academic"
