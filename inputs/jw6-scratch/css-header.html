<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointSav — Design Slides (JW4)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* PointSav / Woodfine palette — primary swapped to teal */
    --blue:#0E7C84;          /* PointSav teal (proposed — confirm exact hex) */
    --blue-deep:#0A5C63;
    --green:#54924E;
    --orange:#F15F22;
    --grey:#E6E7E8;
    --ink-100:#111827;
    --ink-200:#374151;
    --ink-300:#6B7280;
    --ink-400:#9CA3AF;
    --paper-100:#FFFFFF;
    --paper-200:#F7F9FA;
    --paper-300:#E6E7E8;
    --highlight-50:#FDE8DD;
    --rule:#E6E7E8;

    /* type scale (1920x1080) */
    --type-display:124px;
    --type-title:72px;
    --type-eyebrow:26px;
    --type-label:27px;
    --type-sub:38px;
    --type-num:24px;
    --type-foot:24px;

    --pad-x:120px;
    --pad-top:80px;
    --pad-bottom:68px;

    --font-display:"Space Grotesk", system-ui, sans-serif;
    --font-text:"Hanken Grotesk", system-ui, sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0b1b2e;}
  deck-stage:not(:defined){visibility:hidden;}

  section{
    font-family:var(--font-text);
    color:var(--ink-100);
    background:var(--paper-100);
    overflow:hidden;
  }

  /* ---------- icon styling (inline SVG, document CSS reaches slotted light DOM) ---------- */
  .icon-svg{
    display:block;
    width:100%;height:100%;
    overflow:visible;
    --ico-fill:rgba(14,124,132,0.06);
    --ico-stroke:var(--blue);
    --ico-sw:3;
  }
  .icon-svg > *{
    fill:var(--ico-fill);
    stroke:var(--ico-stroke);
    stroke-width:var(--ico-sw);
    stroke-linejoin:round;
    stroke-linecap:round;
  }

  /* ============ COVER ============ */
  .cover{
    background:var(--blue);
    color:#fff;
    padding:var(--pad-top) var(--pad-x) var(--pad-bottom);
    display:flex;
    flex-direction:column;
  }
  .cover .top-row{
    display:flex;align-items:center;gap:18px;
  }
  .cover .wordmark{
    font-family:var(--font-display);
    font-weight:700;
    font-size:34px;
    letter-spacing:0.5px;
  }
  .cover .wordmark .sav{color:#93d2d6;}
  .cover .divider-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.5);}
  .cover .kicker{
    font-size:var(--type-eyebrow);
    letter-spacing:3px;
    text-transform:uppercase;
    color:#93d2d6;
    font-weight:600;
  }
  .cover .headline{margin-top:auto;}
  .cover .eyebrow{
    font-size:var(--type-eyebrow);
    letter-spacing:5px;
    text-transform:uppercase;
    color:#93d2d6;
    font-weight:600;
    margin-bottom:26px;
  }
  .cover h1{
    font-family:var(--font-display);
    font-weight:600;
    font-size:var(--type-display);
    line-height:0.96;
    letter-spacing:-2px;
    margin:0;
  }
  .cover .sub{
    margin-top:30px;
    font-size:var(--type-sub);
    color:#cdeced;
    font-weight:400;
    letter-spacing:0.3px;
  }
  .cover .icon-strip{
    margin-top:58px;
    display:grid;
    grid-template-columns:repeat(9,1fr);
    border-top:1px solid rgba(255,255,255,0.20);
    padding-top:42px;
  }
  .cover .strip-cell{
    display:flex;align-items:center;justify-content:center;
    height:86px;
  }
  .cover .strip-cell .icon-svg{width:70px;height:70px;}
  .cover .icon-strip .icon-svg{
    --ico-stroke:#a7dadd;
    --ico-fill:transparent;
    --ico-sw:3.4;
  }
  .cover .foot{
    position:absolute;
    top:var(--pad-top);
    right:var(--pad-x);
    font-size:var(--type-foot);
    letter-spacing:2px;
    text-transform:uppercase;
    color:#93d2d6;
    font-weight:600;
    text-align:right;
    line-height:1.4;
    white-space:nowrap;
  }

  /* ============ INDEX SLIDE ============ */
  .index{
    padding:var(--pad-top) var(--pad-x) var(--pad-bottom);
    display:flex;
    flex-direction:column;
  }
  .index .head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom:32px;
  }
  .index .head .eyebrow{
    font-size:var(--type-eyebrow);
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--orange);
    font-weight:600;
    margin-bottom:16px;
  }
  .index .head h2{
    font-family:var(--font-display);
    font-weight:600;
    font-size:var(--type-title);
    letter-spacing:-1px;
    margin:0;
    color:var(--ink-100);
  }
  .index .head .meta{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:8px;
  }
  .index .head .meta .count{
    font-family:var(--font-display);
    font-weight:600;
    font-size:30px;
    letter-spacing:1px;
    color:var(--blue);
  }
  .index .head .meta .ctx{
    font-size:var(--type-foot);
    color:var(--ink-300);
    letter-spacing:0.5px;
  }

  .grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    background:var(--rule);
    gap:1px;
    border:1px solid var(--rule);
  }
  .cell{
    background:var(--paper-100);
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
    padding:16px 24px;
  }
  .cell .num{
    position:absolute;
    top:22px;left:26px;
    font-family:var(--font-display);
    font-size:var(--type-num);
    font-weight:600;
    letter-spacing:2px;
    color:var(--ink-400);
  }
  .cell .icon-box{
    width:110px;height:110px;
    display:flex;align-items:center;justify-content:center;
  }
  .cell .labels{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }
  .cell .label{
    font-family:var(--font-display);
    font-size:var(--type-label);
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink-100);
    text-align:center;
    white-space:nowrap;
  }
  .cell .label.alt{
    color:var(--ink-300);
    font-weight:600;
  }

  /* ============ SCALING SLIDES (shared) ============ */
  .scaling{
    padding:54px 88px 46px;
    display:flex;
    flex-direction:column;
  }
  .scaling .head{ margin-bottom:24px; flex:0 0 auto; }
  .scaling .head .eyebrow{
    font-size:24px; letter-spacing:4px; text-transform:uppercase;
    color:var(--orange); font-weight:600; margin-bottom:10px;
  }
  .scaling .head h2{
    font-family:var(--font-display); font-weight:600; font-size:58px;
    letter-spacing:-1px; margin:0; color:var(--ink-100);
  }
  .scaling .head .crumb{
    font-family:var(--font-text); font-size:24px; color:var(--ink-300);
    margin-top:8px; letter-spacing:0.4px;
  }

  /* node primitives */
  .node-label{
    font-family:var(--font-display); font-weight:600; font-size:18px;
    letter-spacing:0.4px; text-transform:uppercase; color:var(--blue-deep);
    text-align:center; line-height:1.08;
  }
  .vm{ font-family:var(--font-text); font-size:14px; font-style:italic; color:var(--ink-400); }
  .ico-line{ fill:rgba(14,124,132,0.04); stroke:var(--blue); stroke-width:2.5; stroke-linejoin:round; }

  /* console (arch) */
  .console{ position:relative; width:166px; height:112px; }
  .console svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  .console .node-label{ position:absolute; left:8px; right:8px; top:36px; }
  .console .vm{ position:absolute; right:16px; bottom:9px; }

  /* virtualization bar */
  .vbar{
    border:2.5px solid var(--blue); border-radius:2px; min-height:46px;
    display:flex; align-items:center; justify-content:center;
    padding:6px 12px; background:var(--paper-100); text-align:center;
  }
  .vbar .node-label{ font-size:16px; color:var(--ink-200); white-space:nowrap; }

  /* totebox (square) */
  .totebox{
    position:relative; border:2.5px solid var(--blue); border-radius:2px;
    background:rgba(14,124,132,0.04); display:flex; align-items:center; justify-content:center;
    padding:8px;
  }
  .totebox .node-label{ font-size:17px; }
  .totebox .vm{ position:absolute; right:10px; bottom:6px; }

  /* hexagon (interface) */
  .hexagon{ position:relative; }
  .hexagon svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  .hexagon .node-label{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 30px; }
  .hexagon .vm{ position:absolute; right:30%; bottom:18%; }

  /* diamond */
  .diamond{ position:relative; display:flex; align-items:center; justify-content:center; }
  .diamond .shape{ position:absolute; left:14%; top:14%; right:14%; bottom:14%; transform:rotate(45deg); border:2.5px solid var(--blue); background:rgba(14,124,132,0.04); }
  .diamond .node-label{ position:relative; font-size:15px; }

  /* parallelogram */
  .para{ position:relative; display:flex; align-items:center; justify-content:center; }
  .para .shape{ position:absolute; inset:0; transform:skewX(-16deg); border:2.5px solid var(--blue); background:rgba(14,124,132,0.04); }
  .para .node-label{ position:relative; font-size:15px; }

  /* cloud */
  .cloud{ position:relative; }
  .cloud svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  .cloud .node-label{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:40% 14% 6%; font-size:12px; line-height:1.05; }

  /* port badge */
  .badge{
    width:42px; height:42px; border-radius:50%; border:2.5px solid var(--blue);
    background:var(--paper-100); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:600; font-size:16px; color:var(--blue-deep);
  }

  /* backend pill */
  .backend{
    border:2.5px solid var(--blue); border-radius:2px; min-height:42px;
    display:flex; align-items:center; justify-content:center; padding:6px 14px;
    font-family:var(--font-display); font-weight:600; font-size:15px; letter-spacing:0.5px;
    text-transform:uppercase; color:var(--ink-100); background:var(--paper-100); text-align:center;
  }

  /* ---- TIERS slide ---- */
  .tiers{ flex:1; display:flex; align-items:center; }
  .tier{ flex:1; display:flex; flex-direction:column; align-items:center; gap:30px; padding:6px 26px 0; align-self:stretch; justify-content:center; }
  .tier + .tier{ border-left:1px solid var(--rule); }
  .tier-head{
    font-family:var(--font-display); font-weight:600; font-size:30px; letter-spacing:3px;
    text-transform:uppercase; color:var(--ink-100); border-bottom:3px solid var(--blue);
    padding-bottom:10px;
  }
  .people{ display:flex; flex-wrap:wrap; gap:10px 16px; justify-content:center; align-items:flex-end; max-width:320px; min-height:58px; }
  .people .person{ width:38px; height:54px; }
  .people .person svg{ width:100%; height:100%; overflow:visible; }
  .units{ display:flex; gap:38px; justify-content:center; align-items:flex-start; margin-top:18px; }
  .stack-unit{ display:flex; flex-direction:column; align-items:center; }
  .stack-unit .vbar{ width:204px; margin-top:-2px; }

  /* ---- COMPOSITION slide ---- */
  .canvas{ position:relative; flex:1; }
  .canvas .wire{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible; }
  .canvas .wire line, .canvas .wire path, .canvas .wire polyline{ stroke:var(--blue); stroke-width:2; fill:none; }
  .canvas .wire .divider{ stroke:var(--blue); stroke-width:1.5; stroke-dasharray:7 8; opacity:0.4; }
  .canvas .wire .dot{ fill:var(--blue); stroke:none; }
  .node{ position:absolute; }
  .zone-label{
    position:absolute; font-family:var(--font-display); font-weight:600; font-size:24px;
    letter-spacing:1px; color:var(--ink-100); line-height:1.1;
  }
  .zone-label small{ display:block; font-size:24px; color:var(--orange); letter-spacing:3px; text-transform:uppercase; font-weight:600; }
  .ps-bar{
    border:3px solid var(--blue); border-radius:2px; background:rgba(14,124,132,0.05);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:600; font-size:22px; letter-spacing:0.5px; color:var(--blue-deep);
  }

  /* ---- PRIVATE NETWORK (Orchestration) slide ---- */
  .privnet .canvas{ position:relative; flex:1; }
  .pnet-boundary{
    position:absolute; border:2.5px dashed var(--blue); border-radius:16px;
    background:rgba(14,124,132,0.025);
  }
  .pnet-cap{
    position:absolute; top:-15px; left:0; right:0; text-align:center;
    font-family:var(--font-display); font-weight:600; font-size:23px; letter-spacing:0.4px; color:var(--blue-deep);
  }
  .pnet-cap span{ display:inline-block; background:var(--paper-100); padding:0 20px; }
  .pnet-cap small{
    display:block; font-size:15px; color:var(--ink-400); text-transform:uppercase;
    letter-spacing:3px; font-weight:600; margin-top:3px;
  }
  .annot{
    position:absolute; font-family:var(--font-text); font-style:italic; font-size:18px; color:var(--ink-400);
    white-space:nowrap;
  }
  .privnet .backend.col{ flex-direction:column; line-height:1.12; }

  /* ---- SERVICES — BOOKKEEPING (Database vs File System) slide ---- */
  .dbfs .cmp2{ flex:1; display:grid; grid-template-columns:1fr 1px 1fr; gap:0 70px; }
  .dbfs .cmp-div{ background:var(--rule); }
  .dbfs .cmp-head{ display:flex; align-items:center; gap:18px; padding-bottom:16px; margin-bottom:30px; border-bottom:3px solid var(--blue); }
  .dbfs .cmp-head .ch-ico{ width:50px; height:50px; flex:0 0 auto; }
  .dbfs .cmp-head .ch-ico svg{ width:100%; height:100%; overflow:visible; }
  .dbfs .cmp-head .ch-ico svg *{ fill:rgba(14,124,132,0.06); stroke:var(--blue); stroke-width:5; stroke-linejoin:round; }
  .dbfs .cmp-head .ch-t{ font-family:var(--font-display); font-weight:600; font-size:34px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-100); white-space:nowrap; }
  .dbfs .cmp-item{ display:flex; align-items:baseline; gap:15px; margin-bottom:22px; font-family:var(--font-text); font-size:27px; color:var(--ink-200); line-height:1.25; }
  .dbfs .cmp-item::before{ content:""; width:9px; height:9px; border-radius:50%; background:var(--blue); transform:translateY(-5px); flex:0 0 auto; }
  .dbfs .cmp-item.lead{ font-family:var(--font-display); font-weight:600; color:var(--ink-100); }
  .dbfs .cmp-sub{ margin:-10px 0 24px 36px; display:flex; gap:14px; }
  .dbfs .cmp-sub .s{
    font-family:var(--font-text); font-size:20px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-400); font-weight:600;
    border:2px solid var(--ink-300); border-radius:999px; padding:5px 18px;
  }
  .dbfs .cmp-rules{ margin-top:30px; display:flex; flex-direction:column; gap:16px; }
  .dbfs .cmp-rule{
    display:flex; align-items:flex-start; gap:14px; border-left:5px solid var(--orange); background:var(--highlight-50);
    padding:14px 20px; border-radius:0 6px 6px 0;
  }
  .dbfs .cmp-rule .rk{ color:var(--orange); font-family:var(--font-display); font-weight:600; font-size:24px; line-height:1.1; flex:0 0 auto; }
  .dbfs .cmp-rule .rt{ font-family:var(--font-text); font-size:24px; color:#7a2e10; line-height:1.3; }
  .dbfs .cmp-rule .rt b{ font-family:var(--font-display); font-weight:600; }
  .dbfs .filechips{ display:flex; flex-direction:column; gap:22px; margin-top:6px; }
  .dbfs .filechip{ display:flex; align-items:center; gap:20px; }
  .dbfs .filechip .fc-ico{ width:42px; height:52px; flex:0 0 auto; }
  .dbfs .filechip .fc-ico svg{ width:100%; height:100%; overflow:visible; }
  .dbfs .filechip .fc-ico svg *{ fill:var(--paper-100); stroke:var(--blue); stroke-width:5; stroke-linejoin:round; }
  .dbfs .filechip .fc-t{ font-family:var(--font-display); font-weight:600; font-size:28px; letter-spacing:0.3px; color:var(--blue-deep); }
  .dbfs .filechip .fc-d{ font-family:var(--font-text); font-size:21px; color:var(--ink-400); }

  /* ---- TOTEBOX SERVICES (ladder) slide ---- */
  .svcladder .stage{ flex:1; position:relative; }
  .tb-square{
    position:absolute; left:60px; top:8px; width:300px; height:172px;
    border:2.5px solid var(--blue); border-radius:3px; background:rgba(14,124,132,0.05);
    display:flex; align-items:center; justify-content:center; position:absolute;
  }
  .tb-square .tb-kick{
    position:absolute; top:16px; left:0; right:0; text-align:center;
    font-family:var(--font-text); font-style:italic; font-size:19px; color:var(--ink-400);
  }
  .tb-square .tb-nm{ font-family:var(--font-display); font-weight:600; font-size:38px; letter-spacing:0.4px; color:var(--blue-deep); }
  .tb-stem{ position:absolute; left:198px; top:180px; width:24px; height:30px; border-left:2.5px solid var(--blue); border-right:2.5px solid var(--blue); background:rgba(14,124,132,0.05); }
  .svc-ladder{
    position:absolute; left:80px; top:210px; width:336px;
    border:2.5px solid var(--blue); border-radius:3px; background:var(--paper-100); overflow:hidden;
  }
  .svc-ladder .rung{
    height:66px; display:flex; align-items:center; gap:16px; padding-left:24px; border-bottom:2px solid var(--blue);
    font-family:var(--font-display); font-weight:600; font-size:24px; letter-spacing:0.3px; color:var(--blue-deep);
  }
  .svc-ladder .rung:last-child{ border-bottom:none; }
  .svc-ladder .rung .rn{
    flex:0 0 auto; width:26px; height:26px; border-radius:50%; border:2px solid var(--ink-300);
    display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--ink-300); font-weight:600;
  }
  .svc-brace{ position:absolute; left:428px; top:210px; width:54px; height:402px; }
  .svc-brace svg{ width:100%; height:100%; overflow:visible; }
  .svc-brace svg path{ fill:none; stroke:var(--blue); stroke-width:2.5; }
  .svc-brace-label{
    position:absolute; left:496px; top:392px; font-family:var(--font-display); font-weight:600;
    font-size:30px; letter-spacing:1px; color:var(--ink-100);
  }
  .future-callout{
    position:absolute; left:790px; top:262px; width:870px;
    border:2.5px solid var(--orange); border-left-width:10px; border-radius:8px; background:var(--highlight-50);
    padding:36px 44px;
  }
  .future-callout .fc-kick{ font-family:var(--font-display); font-weight:600; font-size:18px; letter-spacing:3px; text-transform:uppercase; color:var(--orange); margin-bottom:16px; }
  .future-callout .fc-text{ font-family:var(--font-text); font-size:32px; line-height:1.4; color:#7a2e10; }
  .future-callout .fc-text b{ font-family:var(--font-display); font-weight:600; }

  /* ---- TOTEBOX ARCHIVE (Personnel vs Corporate vs Real Property) slide ---- */
  .archive .head{ position:relative; }
  .cat-tag{
    position:absolute; top:2px; right:0; border:2.5px solid var(--ink-300); border-radius:5px;
    padding:9px 24px; font-family:var(--font-display); font-weight:600; font-size:20px;
    letter-spacing:5px; text-transform:uppercase; color:var(--ink-300);
  }
  .arch-compare{
    flex:0 0 auto; display:grid; grid-template-columns:1fr auto 1fr auto 1fr; align-items:stretch; margin-bottom:30px;
  }
  .arch-card{
    height:236px; border:2.5px solid var(--blue); border-radius:4px; background:rgba(14,124,132,0.035);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; position:relative;
  }
  .arch-card .ac-kicker{
    position:absolute; top:16px; left:0; right:0; text-align:center;
    font-family:var(--font-text); font-size:15px; letter-spacing:3px; text-transform:uppercase; color:var(--ink-400); font-weight:600;
  }
  .arch-card .ac-sq{ width:46px; height:46px; border:2.5px solid var(--blue); background:var(--paper-100); }
  .arch-card .ac-name{ font-family:var(--font-display); font-weight:600; font-size:34px; letter-spacing:0.3px; color:var(--ink-100); }
  .vs-sep{ display:flex; align-items:center; justify-content:center; padding:0 26px;
    font-family:var(--font-text); font-style:italic; font-size:28px; color:var(--ink-300); }
  .arch-why{ display:grid; grid-template-columns:1fr auto 1fr auto 1fr; flex:1; }
  .arch-why .why{ padding-top:4px; }
  .arch-why .why .wt{ font-family:var(--font-text); font-size:23px; color:var(--ink-200); line-height:1.4; }
