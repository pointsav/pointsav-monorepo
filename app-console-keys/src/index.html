<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Ledger | Woodfine Management Corp.</title>
    <style>
        :root { 
            --wf-canvas: #F7F9FA; --wf-card: #FFFFFF; --wf-text: #111827;
            --wf-muted: #6B7280; --wf-accent: #164679; --wf-border: #e9ecef;
            --wf-border-heavy: #111827; --wf-alert: #ED1B2F;
            --font-mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--wf-canvas); color: var(--wf-text); font-family: var(--font-mono); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        header { flex-shrink: 0; border-bottom: 2px solid var(--wf-border-heavy); padding: 12px 24px; display: flex; justify-content: space-between; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; background: var(--wf-card); }
        .hdr-label { color: var(--wf-muted); margin-right: 8px; }
        .hdr-val { color: var(--wf-accent); font-weight: bold; }
        
        /* PANOPTIC WORKSPACE */
        .workspace { display: flex; flex-grow: 1; overflow: hidden; }
        
        /* LEFT RIBBON (THE GLOBAL LENS) */
        .left-ribbon { width: 20%; flex-shrink: 0; background: var(--wf-card); border-right: 2px solid var(--wf-border-heavy); display: flex; flex-direction: column; padding: 24px; overflow-y: auto; }
        
        .vault-selector { margin-bottom: 24px; }
        .vault-selector select { width: 100%; padding: 8px; font-family: var(--font-mono); font-size: 11px; border: 1px solid var(--wf-border-heavy); background: var(--wf-canvas); color: var(--wf-text); font-weight: bold; }
        
        .f-key-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: auto; }
        .f-key { background: var(--wf-canvas); border: 1px solid var(--wf-muted); border-radius: 2px; padding: 10px 12px; font-size: 11px; font-weight: bold; color: var(--wf-text); cursor: pointer; user-select: none; transition: all 0.1s; text-align: left; }
        .f-key:hover { border-color: var(--wf-accent); }
        .f-key.active-key { background: var(--wf-accent); color: #fff; border-color: var(--wf-accent); transform: translateX(4px); box-shadow: -2px 2px 0 var(--wf-border-heavy); }
        
        .telemetry-box { border-top: 1px dashed var(--wf-muted); padding-top: 16px; font-size: 10px; line-height: 1.6; color: var(--wf-muted); }
        .telemetry-box span { color: #54924E; font-weight: bold; }
        
        /* DYNAMIC RESIZER */
        .resizer { width: 4px; background-color: var(--wf-border-heavy); cursor: col-resize; flex-shrink: 0; transition: background-color 0.2s; z-index: 10; }
        .resizer:hover, .resizer.active { background-color: var(--wf-accent); }
        
        /* CARTRIDGE VIEWPORT (Middle + Right Panes inside) */
        .cartridge-viewport { flex-grow: 1; display: flex; overflow: hidden; background: var(--wf-canvas); }
        
        /* OMNIBAR */
        .omnibar { flex-shrink: 0; border-top: 2px solid var(--wf-border-heavy); padding: 16px 24px; display: flex; align-items: center; background: var(--wf-card); }
        .prompt-prefix { color: var(--wf-accent); margin-right: 12px; font-weight: bold; font-size: 15px; }
        #cli-input { background: transparent; border: none; color: var(--wf-text); font-family: inherit; font-size: 15px; flex-grow: 1; outline: none; }
    </style>
</head>
<body>
    <header>
        <div><span class="hdr-label">NODE:</span><span class="hdr-val">console.woodfinegroup.com</span></div>
        <div><span class="hdr-label">AUTH:</span><span class="hdr-val">MACHINE-BASED (MBA)</span></div>
        <div><span class="hdr-label">HUD:</span><span class="hdr-val">PANOPTIC V3.0</span></div>
    </header>
    
    <div class="workspace">
        <div class="left-ribbon">
            <div class="vault-selector">
                <div style="font-size: 10px; color: var(--wf-muted); margin-bottom: 4px; font-weight: bold;">ACTIVE TOTEBOX (THE GLOBAL LENS)</div>
                <select id="global-vault-selector">
                    <option value="personnel-1">cluster-totebox-personnel-1</option>
                    <option value="corporate-1">cluster-totebox-corporate-1</option>
                    <option value="property-1">cluster-totebox-real-property-1</option>
                </select>
            </div>
            
            <div class="f-key-list" id="hardware-ribbon"></div>
            
            <div class="telemetry-box">
                <div>Mesh Sync: <span>SECURE</span></div>
                <div>Storage API: <span>ONLINE (Port 8095)</span></div>
                <div>Nano-SLM: <span>ARMED (135M)</span></div>
            </div>
        </div>
        
        <div class="resizer" id="main-resizer"></div>
        
        <div class="cartridge-viewport" id="cartridge-viewport">
            <div style="width: 100%; display: flex; align-items: center; justify-content: center; color: var(--wf-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">
                [ AWAITING F-KEY STRIKE ]
            </div>
        </div>
    </div>
    
    <div class="omnibar">
        <span class="prompt-prefix" id="ui-prompt">operator@chassis:~$</span>
        <input type="text" id="cli-input" autocomplete="off" spellcheck="false" autofocus>
    </div>
    
    <script>
        const viewport = document.getElementById('cartridge-viewport');
        const input = document.getElementById('cli-input');
        const uiPrompt = document.getElementById('ui-prompt');
        const ribbon = document.getElementById('hardware-ribbon');
        const resizer = document.getElementById('main-resizer');
        const leftRibbon = document.querySelector('.left-ribbon');

        const F_KEY_MAP = {
            'F2': { name: 'app-console-people', label: 'PEOPLE (Spatial CRM)' },
            'F3': { name: 'app-console-email', label: 'EMAIL (Cold Archive)' },
            'F4': { name: 'app-console-content', label: 'CONTENT (Generative Forge)' },
            'F5': { name: 'app-console-vault', label: 'THE VAULT (service-fs)' },
            'F12': { name: 'app-console-input', label: 'INPUT MACHINE (Anchor)' }
        };

        Object.keys(F_KEY_MAP).forEach(key => {
            const btn = document.createElement('div');
            btn.className = 'f-key';
            btn.id = `btn-${key}`;
            btn.textContent = `[${key}] ${F_KEY_MAP[key].label}`;
            btn.onclick = () => mountCartridge(key);
            ribbon.appendChild(btn);
        });

        // DRAG AND DROP PHYSICS
        let isResizing = false;
        resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; resizer.classList.add('active'); });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let newWidth = (e.clientX / window.innerWidth) * 100;
            if (newWidth < 15) newWidth = 15;
            if (newWidth > 40) newWidth = 40;
            leftRibbon.style.width = `${newWidth}%`;
        });
        document.addEventListener('mouseup', () => { isResizing = false; document.body.style.cursor = 'default'; resizer.classList.remove('active'); });

        async function mountCartridge(key) {
            const cartridge = F_KEY_MAP[key];
            document.querySelectorAll('.f-key').forEach(b => b.classList.remove('active-key'));
            document.getElementById(`btn-${key}`).classList.add('active-key');
            uiPrompt.textContent = `operator@${cartridge.name.split('-')[2]}:~$`;
            
            viewport.innerHTML = `<div style="width: 100%; display: flex; align-items: center; justify-content: center; color: var(--wf-muted); font-size: 14px; text-transform: uppercase;">[ FETCHING SECURE PAYLOAD... ]</div>`;

            try {
                const response = await fetch(`/cartridges/${cartridge.name}.html?v=` + Date.now());
                if (response.ok) {
                    viewport.innerHTML = await response.text();
                } else {
                    viewport.innerHTML = `<div style="width: 100%; display: flex; align-items: center; justify-content: center; color: var(--wf-alert); font-weight: bold;">[ FAULT: CARTRIDGE MISSING ]</div>`;
                }
            } catch (err) {
                viewport.innerHTML = `<div style="width: 100%; display: flex; align-items: center; justify-content: center; color: var(--wf-alert); font-weight: bold;">[ FAULT: ISOLATION BOUNDARY BLOCK ]</div>`;
            }
            input.focus();
        }

        document.addEventListener('keydown', function(e) { if (F_KEY_MAP[e.key]) { e.preventDefault(); mountCartridge(e.key); } });
        document.addEventListener('click', (e) => { if (!e.target.closest('.left-ribbon') && e.target.tagName !== 'INPUT') { input.focus(); } });
    </script>
</body>
</html>
