[package]
name = "workplace-workbench"
version = "0.1.0"
description = "WebView shell for the PointSav privategit development workbench"
authors = ["PointSav Digital Systems"]
license = "Apache-2.0"
repository = ""
edition = "2021"
rust-version = "1.70"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
# Tauri v1 — required for macOS 10.13 High Sierra compatibility.
# Tauri v2 requires macOS 10.15+.
tauri = { version = "1.7", features = ["window-all"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
