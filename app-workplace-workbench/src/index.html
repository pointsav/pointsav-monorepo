<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workplace Workbench</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    .status {
      text-align: center;
      font-size: 1.1rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #45475a;
      border-top-color: #89b4fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="status">
    <div class="spinner"></div>
    <p id="msg">Connecting to workbench…</p>
  </div>
  <script type="module">
    const { invoke } = window.__TAURI__.tauri;
    try {
      const url = await invoke('get_workbench_url');
      document.getElementById('msg').textContent = `Opening ${url}`;
      window.location.href = url;
    } catch (e) {
      document.getElementById('msg').textContent = `Error: ${e}`;
    }
  </script>
</body>
</html>
